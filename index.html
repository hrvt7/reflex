<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>NEONSTRIKE - Mars Colony</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#ff9944;--mag:#ff5500;--yel:#ffcc44;--red:#ff2020;--grn:#66cc44;--org:#ff7722;--bg:#0a0504}
body{background:var(--bg);overflow:hidden;font-family:'Orbitron',monospace;color:#fff;height:100vh;width:100vw;
  user-select:none;-webkit-user-select:none;touch-action:none;cursor:none}
canvas#gc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;touch-action:none}

/* Helmet visor overlay */
.visor{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;
  border:clamp(10px,2.5vw,25px) solid rgba(15,10,8,.8);border-radius:clamp(20px,5vw,60px);
  box-shadow:inset 0 0 60px rgba(0,0,0,.5),inset 0 0 150px rgba(120,50,10,.06)}
.visor::before{content:'';position:absolute;top:0;left:0;right:0;height:20%;
  background:linear-gradient(180deg,rgba(200,120,50,.04) 0%,transparent 100%);border-radius:inherit}
.visor::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20%;
  background:linear-gradient(0deg,rgba(160,70,20,.06) 0%,transparent 100%);border-radius:inherit}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;
  padding:max(16px,2.5vw) max(20px,3vw);pointer-events:none}
.hud-l,.hud-c,.hud-r{display:flex;flex-direction:column;gap:3px}
.hud-l{align-items:flex-start}.hud-c{align-items:center}.hud-r{align-items:flex-end}
.h-score{font-size:clamp(18px,4.5vw,32px);font-weight:900;color:var(--cyan);
  text-shadow:0 0 15px var(--cyan),0 0 30px var(--cyan);letter-spacing:2px}
.h-level{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.5vw,11px);color:rgba(255,200,150,.5);letter-spacing:2px}
.xp-bar{width:clamp(70px,16vw,140px);height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:2px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--org),var(--red));border-radius:2px;box-shadow:0 0 6px var(--org);transition:width .3s}
.h-combo{font-size:clamp(13px,3vw,22px);font-weight:700;color:var(--org);text-shadow:0 0 12px var(--org);transition:all .1s;min-height:18px}
.h-combo.hot{color:var(--yel);text-shadow:0 0 25px var(--yel);font-size:clamp(16px,3.5vw,26px)}
.h-combo.fire{color:var(--red);text-shadow:0 0 30px var(--red);font-size:clamp(20px,4.5vw,32px);animation:fShake .1s infinite}
@keyframes fShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px) rotate(-1deg)}75%{transform:translateX(2px) rotate(1deg)}}
.h-mult{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,13px);color:var(--yel);text-shadow:0 0 6px var(--yel);opacity:.8}
.h-timer{font-family:'Share Tech Mono',monospace;font-size:clamp(16px,4vw,28px);color:var(--grn);text-shadow:0 0 12px var(--grn)}
.h-timer.danger{color:var(--red);text-shadow:0 0 15px var(--red);animation:tP .5s infinite}
@keyframes tP{0%,100%{opacity:1}50%{opacity:.3}}
.h-wave{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.6vw,12px);color:rgba(255,200,150,.5);letter-spacing:2px}
.h-mode{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.3vw,10px);color:var(--org);letter-spacing:3px;opacity:.6}
.h-lives{display:flex;gap:clamp(3px,0.7vw,5px);margin-top:3px}
.life-pip{width:clamp(8px,2vw,13px);height:clamp(8px,2vw,13px);border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);transition:.3s}
.life-pip.lost{background:rgba(255,32,64,.3);box-shadow:none}

/* O2 bar */
.o2-bar{position:fixed;bottom:max(20px,3vw);left:max(20px,3vw);z-index:10;pointer-events:none}
.o2-label{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.5vw,11px);color:rgba(255,200,150,.4);letter-spacing:3px;margin-bottom:3px}
.o2-track{width:clamp(100px,20vw,180px);height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;
  border:1px solid rgba(255,200,150,.1)}
.o2-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--grn));border-radius:3px;box-shadow:0 0 8px var(--cyan);transition:width .3s}

/* Crosshair / Scope */
.scope{position:fixed;z-index:99;pointer-events:none;width:clamp(50px,10vw,70px);height:clamp(50px,10vw,70px);
  transform:translate(-50%,-50%);display:block;transition:transform .06s}
.scope::before,.scope::after{content:'';position:absolute;background:rgba(255,100,30,.7);
  box-shadow:0 0 6px rgba(255,100,30,.5);border-radius:1px}
.scope::before{width:1.5px;height:30%;left:50%;top:0;transform:translateX(-50%)}
.scope::after{width:1.5px;height:30%;left:50%;bottom:0;transform:translateX(-50%)}
.scope .sh{position:absolute;background:rgba(255,100,30,.7);box-shadow:0 0 6px rgba(255,100,30,.5);border-radius:1px}
.scope .sh:first-child{height:1.5px;width:30%;top:50%;left:0;transform:translateY(-50%)}
.scope .sh:last-child{height:1.5px;width:30%;top:50%;right:0;transform:translateY(-50%)}
.scope .dot{position:absolute;width:4px;height:4px;background:var(--red);border-radius:50%;top:50%;left:50%;
  transform:translate(-50%,-50%);box-shadow:0 0 6px var(--red),0 0 12px var(--red)}
.scope .ring{position:absolute;top:6px;left:6px;right:6px;bottom:6px;border:1px solid rgba(255,100,30,.25);border-radius:50%}
.scope .ring2{position:absolute;top:0;left:0;right:0;bottom:0;border:1.5px solid rgba(255,100,30,.15);border-radius:50%}

/* Banners */
.banner{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:60;
  font-size:clamp(28px,7vw,70px);font-weight:900;letter-spacing:4px;pointer-events:none;opacity:0;white-space:nowrap}
.banner.show{animation:banB .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes banB{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}
  30%{transform:translate(-50%,-50%) scale(1.2) rotate(2deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.8) rotate(0);opacity:0}}
.wave-ban{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:70;text-align:center;pointer-events:none;opacity:0}
.wave-ban.show{animation:wF 1.5s ease-out forwards}
.wave-ban .wn{font-size:clamp(40px,10vw,100px);font-weight:900;color:var(--org);text-shadow:0 0 30px var(--org),0 0 60px rgba(255,136,0,.5);line-height:1}
.wave-ban .wl{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,15px);color:rgba(255,200,150,.5);letter-spacing:8px;text-transform:uppercase}
@keyframes wF{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}

/* Achievement */
.ach{position:fixed;top:max(60px,9vh);right:max(10px,2vw);z-index:90;background:linear-gradient(135deg,rgba(20,10,5,.9),rgba(40,20,10,.9));
  border:1px solid var(--org);border-radius:8px;padding:11px 15px;display:flex;align-items:center;gap:10px;
  box-shadow:0 0 25px rgba(255,136,0,.3);animation:aS 3s ease-in-out forwards;pointer-events:none;max-width:90vw}
.ach .ai{font-size:22px}.ach .at{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.6vw,11px);color:var(--org);letter-spacing:1px}
.ach .an{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(10px,1.8vw,13px);color:#fff;display:block;margin-bottom:2px}
@keyframes aS{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}

/* Damage flash */
.dmg-flash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:55;pointer-events:none;
  background:radial-gradient(ellipse,transparent 40%,rgba(255,0,0,.4));opacity:0;transition:opacity .15s}
.dmg-flash.show{opacity:1}

/* Screens */
.scr{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(10,5,5,.96);backdrop-filter:blur(20px);cursor:default;padding:20px;overflow-y:auto}
.scr.hidden{display:none}
.title{font-size:clamp(32px,9vw,90px);font-weight:900;letter-spacing:clamp(3px,1vw,8px);
  background:linear-gradient(135deg,var(--org),var(--red),var(--yel));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 25px rgba(255,100,30,.6));animation:tG 3s ease-in-out infinite}
@keyframes tG{0%,100%{filter:drop-shadow(0 0 25px rgba(255,100,30,.6))}50%{filter:drop-shadow(0 0 25px rgba(255,32,64,.6))}}
.sub{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,16px);color:rgba(255,180,120,.4);margin-top:8px;letter-spacing:clamp(2px,.8vw,6px);text-transform:uppercase}
.mars-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.5vw,12px);color:rgba(255,100,50,.3);margin-top:4px;letter-spacing:4px}
.mode-sel{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:clamp(8px,2vw,14px);margin-top:clamp(16px,3.5vw,35px);width:min(640px,92vw)}
.mc{padding:clamp(10px,2vw,18px) clamp(8px,1.5vw,14px);background:rgba(255,100,30,.03);border:1px solid rgba(255,100,30,.15);
  border-radius:6px;cursor:pointer;text-align:center;transition:.2s}
.mc:hover,.mc:active{border-color:var(--org);background:rgba(255,100,30,.08);transform:translateY(-3px);box-shadow:0 6px 25px rgba(255,100,30,.2)}
.mc .mi{font-size:clamp(22px,4.5vw,32px);margin-bottom:6px}
.mc .mn{font-size:clamp(11px,2.2vw,15px);font-weight:700;letter-spacing:2px;margin-bottom:3px}
.mc .md{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.3vw,9px);color:rgba(255,200,150,.4);letter-spacing:1px;line-height:1.4}
.mc.blitz .mn{color:var(--org)}.mc.surv .mn{color:var(--red)}.mc.zen .mn{color:var(--grn)}.mc.prec .mn{color:var(--yel)}
.plvl{margin-top:14px;text-align:center}
.plvl .lt{font-size:clamp(9px,1.8vw,12px);color:var(--org);letter-spacing:3px;text-shadow:0 0 8px var(--org)}
.plvl .xbl{width:clamp(100px,25vw,180px);height:5px;background:rgba(255,255,255,.06);border-radius:3px;margin:5px auto 0;overflow:hidden}
.plvl .xbl .f{height:100%;background:linear-gradient(90deg,var(--org),var(--red));border-radius:3px;box-shadow:0 0 6px var(--org)}
.hs-disp{margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,12px);color:var(--yel);
  text-shadow:0 0 8px var(--yel);letter-spacing:2px;text-align:center;line-height:1.8}
.et{font-size:clamp(24px,6vw,56px);font-weight:900;letter-spacing:4px}
.et.vic{background:linear-gradient(135deg,var(--yel),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 15px rgba(255,230,0,.5))}
.et.def{background:linear-gradient(135deg,var(--red),var(--org));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 15px rgba(255,32,64,.5))}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,1.5vw,12px);margin-top:clamp(14px,2.5vw,24px);width:min(440px,92vw)}
.sc{background:rgba(255,100,30,.03);border:1px solid rgba(255,100,30,.1);padding:clamp(8px,1.5vw,12px);text-align:center;border-radius:4px}
.sc .sl{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.2vw,9px);color:rgba(255,200,150,.4);letter-spacing:2px;text-transform:uppercase}
.sc .sv{font-size:clamp(14px,3.5vw,22px);font-weight:900;margin-top:3px;color:var(--org);text-shadow:0 0 10px var(--org)}
.sc .sv.red{color:var(--red);text-shadow:0 0 10px var(--red)}
.sc .sv.yel{color:var(--yel);text-shadow:0 0 10px var(--yel)}
.sc .sv.grn{color:var(--grn);text-shadow:0 0 10px var(--grn)}
.xpg{margin-top:10px;font-size:clamp(11px,2.5vw,15px);font-weight:700;color:var(--org);text-shadow:0 0 12px var(--org);letter-spacing:2px;animation:xpP 1s infinite}
@keyframes xpP{0%,100%{opacity:1}50%{opacity:.6}}
.btn{padding:clamp(10px,2vw,15px) clamp(28px,7vw,45px);font-family:'Orbitron',monospace;font-size:clamp(12px,2.5vw,17px);
  font-weight:700;letter-spacing:3px;color:#fff;background:linear-gradient(135deg,var(--org),var(--red));border:none;cursor:pointer;
  clip-path:polygon(5% 0%,100% 0%,95% 100%,0% 100%);transition:.2s;text-transform:uppercase;margin-top:18px;
  box-shadow:0 0 20px rgba(255,100,30,.3)}
.btn:hover,.btn:active{transform:scale(1.05);box-shadow:0 0 40px rgba(255,100,30,.5)}
.btn.sec{background:transparent;color:var(--org);border:1px solid var(--org);clip-path:none;
  font-size:clamp(8px,1.8vw,11px);padding:8px 22px;letter-spacing:3px;margin-top:8px;box-shadow:none}
.btn.sec:hover{background:rgba(255,100,30,.1);color:#fff}
.snd{position:fixed;top:8px;right:10px;z-index:110;font-size:clamp(14px,3.5vw,20px);background:none;border:none;cursor:pointer;opacity:.35;padding:6px}
.snd:hover,.snd:active{opacity:.7}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div class="visor"></div>
<div class="dmg-flash" id="dmgFlash"></div>

<div class="scope" id="scope">
  <div class="sh"></div><div class="sh"></div>
  <div class="dot"></div><div class="ring"></div><div class="ring2"></div>
</div>

<div class="hud" id="hud" style="display:none">
  <div class="hud-l">
    <div class="h-score" id="hScore">0</div>
    <div class="h-level" id="hLevel">LVL 1</div>
    <div class="xp-bar"><div class="xp-fill" id="hXp" style="width:0%"></div></div>
  </div>
  <div class="hud-c">
    <div class="h-combo" id="hCombo"></div>
    <div class="h-mult" id="hMult"></div>
  </div>
  <div class="hud-r">
    <div class="h-timer" id="hTimer">30.0</div>
    <div class="h-wave" id="hWave">WAVE 1</div>
    <div class="h-mode" id="hMode"></div>
    <div class="h-lives" id="hLives"></div>
  </div>
</div>

<div class="o2-bar" id="o2Bar" style="display:none">
  <div class="o2-label">O2 SUPPLY</div>
  <div class="o2-track"><div class="o2-fill" id="o2Fill" style="width:100%"></div></div>
</div>

<div class="banner" id="banner"></div>
<div class="wave-ban" id="wBan"><div class="wl">WAVE</div><div class="wn" id="wNum">1</div></div>
<button class="snd" id="sndBtn">🔊</button>

<div class="scr" id="startScr">
  <div class="title">NEONSTRIKE</div>
  <div class="sub">mars colony defense</div>
  <div class="mars-sub">SOL 2847 // OLYMPUS MONS SECTOR 7</div>
  <div class="mode-sel">
    <div class="mc blitz" data-mode="blitz"><div class="mi">⚡</div><div class="mn">BLITZ</div><div class="md">30 SEC PATROL</div></div>
    <div class="mc surv" data-mode="survival"><div class="mi">💀</div><div class="mn">SURVIVAL</div><div class="md">5 SHIELDS ENDLESS</div></div>
    <div class="mc zen" data-mode="zen"><div class="mi">🔭</div><div class="mn">RECON</div><div class="md">NO PRESSURE</div></div>
    <div class="mc prec" data-mode="precision"><div class="mi">🎯</div><div class="mn">PRECISION</div><div class="md">3 MISSES ABORT</div></div>
  </div>
  <div class="plvl"><div class="lt" id="mLvl">RANK 1</div><div class="xbl"><div class="f" id="mXp" style="width:0%"></div></div></div>
  <div class="hs-disp" id="hsStart"></div>
</div>

<div class="scr hidden" id="endScr">
  <div class="et def" id="eTitle">MISSION FAILED</div>
  <div class="sg">
    <div class="sc"><div class="sl">Score</div><div class="sv" id="fScore">0</div></div>
    <div class="sc"><div class="sl">Combo</div><div class="sv yel" id="fCombo">0</div></div>
    <div class="sc"><div class="sl">Kills</div><div class="sv red" id="fHits">0</div></div>
    <div class="sc"><div class="sl">Accuracy</div><div class="sv grn" id="fAcc">0%</div></div>
    <div class="sc"><div class="sl">Wave</div><div class="sv" id="fWave">1</div></div>
    <div class="sc"><div class="sl">Bosses</div><div class="sv red" id="fBoss">0</div></div>
  </div>
  <div class="xpg" id="xpG"></div>
  <div class="hs-disp" id="hsEnd"></div>
  <button class="btn" id="rBtn">RETRY MISSION</button>
  <button class="btn sec" id="mBtn">BASE CAMP</button>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.162.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from'three';

const canvas=document.getElementById('gc');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x1a0a04);
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x8b4020,40,180);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,500);
camera.position.set(0,3,0);
camera.rotation.order='YXZ';

// Space skybox with stars
const skyGeo=new THREE.SphereGeometry(300,32,32);
const skyCanvas=document.createElement('canvas');
skyCanvas.width=2048;skyCanvas.height=1024;
const sCtx=skyCanvas.getContext('2d');
// Mars atmosphere gradient - warm peachy horizon, dark sky above
const grad=sCtx.createLinearGradient(0,0,0,1024);
grad.addColorStop(0,'#0a0408');
grad.addColorStop(0.3,'#120610');
grad.addColorStop(0.5,'#2a0f0a');
grad.addColorStop(0.65,'#6b2810');
grad.addColorStop(0.75,'#a04418');
grad.addColorStop(0.82,'#c06028');
grad.addColorStop(0.88,'#d08040');
grad.addColorStop(0.93,'#cc7838');
grad.addColorStop(1,'#8b4020');
sCtx.fillStyle=grad;sCtx.fillRect(0,0,2048,1024);
// Stars (dim, only visible in upper sky - Mars atmosphere obscures near horizon)
for(let i=0;i<600;i++){
  const x=Math.random()*2048,y=Math.random()*500;
  const r=Math.random()<.8?.4:.8;
  sCtx.beginPath();sCtx.arc(x,y,r,0,Math.PI*2);
  const b=120+Math.floor(Math.random()*80);
  sCtx.fillStyle=`rgba(${b},${b-10},${b+10},${.15+Math.random()*.25})`;
  sCtx.fill();
}
// Atmospheric dust bands (Mars has dusty atmosphere layers)
sCtx.globalAlpha=.04;
for(let i=0;i<5;i++){
  const y=600+i*60+Math.random()*40;
  const g2=sCtx.createLinearGradient(0,y-30,0,y+30);
  g2.addColorStop(0,'transparent');g2.addColorStop(.5,'#cc8844');g2.addColorStop(1,'transparent');
  sCtx.fillStyle=g2;sCtx.fillRect(0,y-30,2048,60);
}
sCtx.globalAlpha=1;
const skyTex=new THREE.CanvasTexture(skyCanvas);
const skyMat=new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide});
const skyMesh=new THREE.Mesh(skyGeo,skyMat);
scene.add(skyMesh);

// Earth and Phobos in the sky
const earthGeo=new THREE.SphereGeometry(2,16,16);
const earthMat=new THREE.MeshBasicMaterial({color:0x3366cc});
const earth=new THREE.Mesh(earthGeo,earthMat);
earth.position.set(-40,55,-80);
scene.add(earth);
// Earth glow
const eGlowGeo=new THREE.SphereGeometry(2.5,16,16);
const eGlowMat=new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:0.15});
const eGlow=new THREE.Mesh(eGlowGeo,eGlowMat);
earth.add(eGlow);

// Phobos (small irregular moon)
const phobosGeo=new THREE.DodecahedronGeometry(0.8,0);
const phobosMat=new THREE.MeshStandardMaterial({color:0x887766,roughness:1,flatShading:true});
const phobos=new THREE.Mesh(phobosGeo,phobosMat);
phobos.position.set(30,40,-60);
scene.add(phobos);

// Mars lighting - warm, dusty, orange tones
const ambLight=new THREE.AmbientLight(0x8b4422,1.2);
scene.add(ambLight);

// ========== TERRAIN HEIGHT (lightweight) ==========
function hash(x,z){const n=Math.sin(x*127.1+z*311.7)*43758.5453;return n-Math.floor(n);}
function lerp(a,b,t){return a+(b-a)*t;}
function noise2D(x,z){
  const ix=Math.floor(x),iz=Math.floor(z);
  const fx=x-ix,fz=z-iz;
  const sx=fx*fx*(3-2*fx),sz=fz*fz*(3-2*fz);
  return lerp(lerp(hash(ix,iz),hash(ix+1,iz),sx),lerp(hash(ix,iz+1),hash(ix+1,iz+1),sx),sz);
}
function fbm(x,z){
  return noise2D(x,z)+noise2D(x*2,z*2)*.5+noise2D(x*4,z*4)*.25;
}

function getH(wx,wz){
  let h=fbm(wx*.012,wz*.012)*7;
  h+=Math.sin(wx*.02)*2+Math.cos(wz*.018)*2;
  h+=noise2D(wx*.06,wz*.06)*.8;
  // Occasional craters
  const cx=Math.floor(wx*.01)*100,cz=Math.floor(wz*.01)*100;
  const cd=hash(cx,cz);
  if(cd>.7){
    const ccx=cx+hash(cx+1,cz)*80,ccz=cz+hash(cx,cz+1)*80;
    const dr=Math.sqrt((wx-ccx)**2+(wz-ccz)**2);
    const cr=5+cd*10;
    if(dr<cr) h-=(1-dr/cr)*3;
    if(dr>cr&&dr<cr*1.3) h+=(1-(dr-cr)/(cr*.3))*1;
  }
  return h-1;
}

// Terrain mesh - moderate resolution, static world-space
const terrainGeo=new THREE.PlaneGeometry(300,300,80,80);
const posAttr=terrainGeo.attributes.position;

function buildTerrain(oZ){
  for(let i=0;i<posAttr.count;i++){
    const lx=posAttr.getX(i);
    const lz=posAttr.getY(i)+oZ;
    posAttr.setZ(i,getH(lx,lz));
  }
  posAttr.needsUpdate=true;
  terrainGeo.computeVertexNormals();
  // Colors
  let ca=terrainGeo.attributes.color;
  if(!ca){
    ca=new THREE.BufferAttribute(new Float32Array(posAttr.count*3),3);
    terrainGeo.setAttribute('color',ca);
  }
  for(let i=0;i<posAttr.count;i++){
    const h=posAttr.getZ(i);
    const lx=posAttr.getX(i),lz=posAttr.getY(i);
    const t=Math.max(0,Math.min(1,(h+4)/12));
    const n=noise2D(lx*.1,lz*.1); // texture variation
    // Mars colors: deep red-brown to sandy orange
    const r=.35+t*.3+n*.08;
    const g=.12+t*.12+n*.04;
    const b=.05+t*.04+n*.02;
    ca.setXYZ(i,r,g,b);
  }
  ca.needsUpdate=true;
}

function createLaser(from,to,color=0xff6622,isHit=true){
  const dir=new THREE.Vector3().subVectors(to,from);
  const len=dir.length();
  const bg=new THREE.CylinderGeometry(.03,.03,len,6);
  bg.rotateX(Math.PI/2);bg.translate(0,0,len/2);
  const bm=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.9});
  const beam=new THREE.Mesh(bg,bm);
  beam.position.copy(from);beam.lookAt(to);scene.add(beam);
  const gg=new THREE.CylinderGeometry(.12,.12,len,6);
  gg.rotateX(Math.PI/2);gg.translate(0,0,len/2);
  const gm=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.2});
  const glow=new THREE.Mesh(gg,gm);
  glow.position.copy(from);glow.lookAt(to);scene.add(glow);
  const fg=new THREE.SphereGeometry(.3,8,8);
  const fm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1});
  const flash=new THREE.Mesh(fg,fm);flash.position.copy(from);scene.add(flash);
  const ig=new THREE.SphereGeometry(isHit?.6:.2,8,8);
  const im=new THREE.MeshBasicMaterial({color,transparent:true,opacity:1});
  const impact=new THREE.Mesh(ig,im);impact.position.copy(to);scene.add(impact);
  const il=new THREE.PointLight(color,isHit?3:1,isHit?12:5);il.position.copy(to);scene.add(il);
  const ml=new THREE.PointLight(color,1.5,6);ml.position.copy(from);scene.add(ml);
  laserBeams.push({beam,glow,flash,impact,il,ml,life:1,decay:isHit?.04:.06});
}

let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function snd(type,freq,dur,vol=.1){
  if(!audioCtx||!soundEnabled)return;
  const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=type;
  o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq*(type==='sawtooth'?.3:2),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start();o.stop(t+dur);return o;
}
function playShoot(){snd('sine',2000,.1,.1);snd('square',1500,.06,.05);}
function playHit(f=600){snd('square',f,.1,.1);snd('sine',f*1.5,.07,.04);}

function playCombo(){if(!audioCtx||!soundEnabled)return;[500,750,1000,1300].forEach((f,i)=>setTimeout(()=>snd('sine',f,.12,.06),i*45));}
function playBossHit(){snd('square',120,.15,.12);}

function startMusic(){
  if(!audioCtx||!soundEnabled||musicPlaying)return;musicPlaying=true;
  const bpm=130,bl=60/bpm;
  const bass=[41.2,41.2,55,49,41.2,41.2,61.7,55];
  let beat=0;
  function tick(){
    if(!musicPlaying)return;
    const t=audioCtx.currentTime+.05,b=beat%8;
    if(b%2===0){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';
      o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(25,t+.12);
      g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12);musicNodes.push(o);}
    {const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.04,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const n=audioCtx.createBufferSource();n.buffer=buf;
    const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;
    const g=audioCtx.createGain();g.gain.setValueAtTime(b%2===0?.03:.015,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
    n.connect(hp);hp.connect(g);g.connect(audioCtx.destination);n.start(t);n.stop(t+.04);}
    if(b%2===0){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';
      o.frequency.setValueAtTime(bass[b],t);g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
      o.start(t);o.stop(t+.18);musicNodes.push(o);}
    if(combo>=5&&b%2===1){const arp=[165,220,330,440,550];
      snd('triangle',Math.min(arp[b%arp.length]*(1+Math.floor(combo/10)*.2),1800),.08,.02+Math.min(combo*.001,.04));}
    beat++;if(musicPlaying)setTimeout(tick,bl*1000*gameSpeed);
  }tick();
}
function stopMusic(){musicPlaying=false;musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];}

function pickType(){
  const r=Math.random();
  const dc=Math.min(.10+wave*.015,.22),fc=Math.min(.12+wave*.025,.35);
  const pc=wave>=2?Math.min(.08+wave*.01,.15):0,sc=wave>=3?Math.min(.06+wave*.01,.12):0;
  let c=0;c+=dc;if(r<c)return'danger';c+=.07;if(r<c)return'bonus';
  c+=pc;if(r<c)return'phantom';c+=sc;if(r<c)return'splitter';c+=fc;if(r<c)return'fast';return'normal';
}

function spawnAlien(type,pos,lifeOvr,isChild){
  if(!gameActive)return;

    const a=(Math.random()-.5)*2;

  // Alien "tentacles" / spikes

    spike.lookAt(0,0,0);
    mesh.add(spike);
  }

  // Eyes (2 glowing dots)
  const eyeGeo=new THREE.SphereGeometry(.15,8,8);

  const eye1=new THREE.Mesh(eyeGeo,eyeMat);eye1.position.set(-.3,.3,1);mesh.add(eye1);
  const eye2=new THREE.Mesh(eyeGeo,eyeMat);eye2.position.set(.3,.3,1);mesh.add(eye2);

  // Glow
  const glowMat=new THREE.MeshBasicMaterial({color:cfg.color,transparent:true,opacity:.12});
  const glow=new THREE.Mesh(sphereGeo,glowMat);glow.scale.setScalar(1.4);mesh.add(glow);

  // Only add lights to some aliens for performance

function popAlien(alien){
  const pos=alien.mesh.position.clone();
  createSplat(pos,alien.cfg.color,20+Math.floor(combo/3)*4,1+combo*.04);
  createRing(pos,alien.cfg.color);

  const mesh=alien.mesh;const st=performance.now();
  function go(){const t=(performance.now()-st)/300;if(t>=1){scene.remove(mesh);return;}
    mesh.scale.setScalar(alien.r*(1-t));if(mesh.material)mesh.material.opacity=.88*(1-t);requestAnimationFrame(go);}go();
}

function hitAlien(alien){
  if(!alien.alive||!gameActive)return;
  const{type,cfg}=alien;clicks++;

  if(type==='danger'){
    if(activePU.shield){
      alien.alive=false;clearTimeout(alien.timer);
      const p=alien.mesh.position.clone();
      popAlien(alien);playHit(400);showFloat(p,'BLOCKED','#4488ff');
    }else{
      alien.alive=false;clearTimeout(alien.timer);combo=0;
      if(gameMode==='survival')loseLife();
      else if(gameMode==='precision'){misses++;if(misses>=3){endGame();return;}}
      else score=Math.max(0,score+cfg.pts);
      const dp=alien.mesh.position.clone();
      playDanger();popAlien(alien);showFloat(dp,cfg.pts,'#ff2040');
      shakeScreen(8);showDmg();
    }
  }else if(type==='powerup'){
    alien.alive=false;clearTimeout(alien.timer);
    popAlien(alien);activatePU(alien.puType);playPowerup();
  }else if(type==='boss'){
    alien.hp--;hits++;
    playBossHit();shakeScreen(4);
    createSplat(alien.mesh.position.clone(),0xff0066,8,.7);
    combo++;if(combo>maxCombo)maxCombo=combo;
    const m=getMult(),pts=Math.round(15*m);score+=pts;
    showFloat(alien.mesh.position,pts,'#ff0066');
    if(alien.hp<=0){
      alien.alive=false;clearTimeout(alien.timer);bossesKilled++;
      const bp=Math.round(cfg.pts*m);score+=bp;
      const bpos=alien.mesh.position.clone();
      playBossDie();shakeScreen(15);popAlien(alien);
      showFloat(bpos.clone().add(new THREE.Vector3(0,1,0)),bp,'#ffe600');
      showBanner('BOSS ELIMINATED','#ff0066');
      checkAch('boss','BOSS SLAYER','Eliminated a boss');
      spawnPU(bpos);
    }else{
      alien.mesh.material.emissiveIntensity=3;
      setTimeout(()=>{if(alien.mesh.material)alien.mesh.material.emissiveIntensity=.8;},80);
      if(alien.bossRing)alien.bossRing.scale.setScalar(alien.hp/alien.maxHp);
    }
    updateHUD();return;
  }else{
    alien.alive=false;clearTimeout(alien.timer);
    hits++;totalHW++;combo++;if(combo>maxCombo)maxCombo=combo;
    const m=getMult(),pts=Math.round(cfg.pts*m);score+=pts;
    const hp=alien.mesh.position.clone();
    playHit(cfg.freq);popAlien(alien);
    showFloat(hp,'+'+pts,'#'+new THREE.Color(cfg.color).getHexString());
    if(combo>=5)shakeScreen(2+Math.min(combo*.2,5));
    checkComboMs();
    if(type==='splitter'&&!alien.isChild){
      spawnAlien('normal',hp.clone().add(new THREE.Vector3(-2,.5,-2)),1800,true);
      spawnAlien('normal',hp.clone().add(new THREE.Vector3(2,.5,-2)),1800,true);
    }
    if(Math.random()<.04+wave*.004)spawnPU(hp);
  }
  updateHUD();
}

  if(type==='nuke'){
    aliens.forEach(b=>{if(b.alive&&b.type!=='danger'&&b.type!=='boss'&&b.type!=='powerup'){

// ========== INPUT ==========
const scope=document.getElementById('scope');
let aimX=innerWidth/2,aimY=innerHeight/2;

function getGunPos(){
  return new THREE.Vector3(camera.position.x,camera.position.y-.5,camera.position.z+.5);
}

function fireShot(x,y){
  if(!gameActive)return;
  pointer.x=(x/innerWidth)*2-1;pointer.y=-(y/innerHeight)*2+1;
  playShoot();
  scope.style.transform='translate(-50%,-50%) scale(1.3)';
  setTimeout(()=>{scope.style.transform='translate(-50%,-50%) scale(1)';},60);

  raycaster.setFromCamera(pointer,camera);
  const meshes=aliens.filter(a=>a.alive).map(a=>a.mesh);
  const ints=raycaster.intersectObjects(meshes,true);
  const gunPos=getGunPos();

  if(ints.length>0){
    let hm=ints[0].object;while(hm.parent&&hm.parent!==scene)hm=hm.parent;
    const alien=aliens.find(a=>a.mesh===hm&&a.alive);
    if(alien){createLaser(gunPos,alien.mesh.position.clone(),alien.cfg.color,true);hitAlien(alien);return;}
  }
  // Miss
  const mDir=new THREE.Vector3(pointer.x,pointer.y,.5).unproject(camera);
  const mT=camera.position.clone().add(mDir.sub(camera.position).normalize().multiplyScalar(50));
  createLaser(gunPos,mT,0xff2040,false);
  clicks++;if(combo>0)combo=0;
  if(gameMode==='precision'){misses++;if(misses>=3){endGame();return;}}
  if(gameActive){updateHUD();playMiss();}
}

canvas.addEventListener('pointerdown',e=>{e.preventDefault();aimX=e.clientX;aimY=e.clientY;
  scope.style.left=e.clientX+'px';scope.style.top=e.clientY+'px';fireShot(e.clientX,e.clientY);});
canvas.addEventListener('pointermove',e=>{aimX=e.clientX;aimY=e.clientY;

document.addEventListener('mousemove',e=>{scope.style.left=e.clientX+'px';scope.style.top=e.clientY+'px';});

// ========== GAME ==========
let lastFrame=0;

function startGame(mode){
  initAudio();gameMode=mode;
  score=0;combo=0;maxCombo=0;hits=0;misses=0;clicks=0;
  timeLeft=30;wave=1;lives=5;bossesKilled=0;totalHW=0;
  gameActive=true;gameSpeed=1;activePU={};spawnAccum=0;playerZ=0;

  aliens.forEach(a=>{clearTimeout(a.timer);scene.remove(a.mesh);});aliens=[];
  splatParts.forEach(s=>scene.remove(s.mesh));splatParts=[];
  laserBeams.forEach(lb=>{scene.remove(lb.beam);scene.remove(lb.glow);scene.remove(lb.flash);scene.remove(lb.impact);scene.remove(lb.il);scene.remove(lb.ml);});laserBeams=[];
  rings.forEach(r=>scene.remove(r.mesh));rings=[];

  camera.position.set(0,3,0);camera.rotation.set(0,0,0);
  lastTerrainZ=0;buildTerrain(0);terrain.position.z=0;
  // Reset rocks around start
  rocks.forEach((r,i)=>{
    r.z=-i*3;
    const rx=(Math.random()-.5)*60;
    r.mesh.position.set(rx,getH(rx,r.z)+r.mesh.scale.x*.3,r.z);
  });
  document.getElementById('startScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  document.getElementById('o2Bar').style.display='block';
  document.getElementById('hMode').textContent=mode.toUpperCase();
  updateHUD();showWave();startMusic();
  lastFrame=performance.now();
}

function gameLoop(){
  requestAnimationFrame(gameLoop);
  const now=performance.now();
  const rawDt=Math.min((now-lastFrame)/1000,.1);lastFrame=now;

  if(!gameActive){
    renderer.render(scene,camera);return;
  }

  const dt=rawDt*gameSpeed;

  // Move forward in world space
  playerZ-=moveSpeed*dt;
  camera.position.z=playerZ;

  // Rebuild terrain when moved far enough (tile scrolling)
  if(Math.abs(playerZ-lastTerrainZ)>60){
    lastTerrainZ=playerZ;
    buildTerrain(playerZ);
  }
  terrain.position.z=playerZ; // keep terrain centered on player

  // Camera Y follows terrain smoothly
  const camH=getH(0,playerZ);
  const targetY=camH+2.5;
  camera.position.y+=(targetY-camera.position.y)*.12;

  // Gentle slope tilt
  const hA=getH(0,playerZ-1.5);
  const slope=Math.atan2(hA-camH,1.5)*.2;
  camera.rotation.x+=(slope-camera.rotation.x)*.06;

  // Subtle head bob
  const bob=now*.003;
  camera.position.y+=Math.sin(bob)*.04;
  camera.position.x=Math.sin(bob*.5)*.05;

  // Recycle rocks that fell behind
  rocks.forEach(r=>{
    if(r.z>playerZ+20){
      r.z=playerZ-60-Math.random()*40;
      const rx=(Math.random()-.5)*60;
      r.mesh.position.set(rx,getH(rx,r.z)+r.mesh.scale.x*.3,r.z);
    }
  });

  // Dust follows camera loosely
  dustPts.position.z=playerZ;

  // Sky objects follow camera (infinitely far away feeling)
  skyMesh.position.z=playerZ;
  sun.position.z=playerZ+40;
  earth.position.z=playerZ-80;
  phobos.position.z=playerZ-60;
  phobos.rotation.y+=rawDt*.2;

  // Mountains follow on Z only (always on horizon)
  mts.forEach(m=>{
    if(m.position.z>playerZ+100) m.position.z-=300;
    if(m.position.z<playerZ-200) m.position.z+=300;
  });

  // Timer
  if(gameMode==='blitz'){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endGame();return;}
    const nw=Math.floor((30-timeLeft)/8)+1;if(nw>wave&&nw<=4){wave=nw;showWave();}}
  else{const hpw=12+wave*4;if(totalHW>=hpw){wave++;totalHW=0;showWave();
    if(gameMode==='survival'&&wave%3===0)setTimeout(()=>spawnBoss(),500);}}

  // O2 display (cosmetic)
  const o2=gameMode==='blitz'?timeLeft/30*100:100;
  document.getElementById('o2Fill').style.width=o2+'%';

  // Spawn
  spawnAccum+=dt*1000;const rate=getSpawnRate();
  while(spawnAccum>=rate){spawnAccum-=rate;spawnAlien();}

  // Update aliens (use index loop so we can safely remove + handle endGame)
  for(let ai=aliens.length-1;ai>=0;ai--){
    const alien=aliens[ai];
    // Remove dead aliens from array
    if(!alien.alive){aliens.splice(ai,1);continue;}
    if(!gameActive)break; // endGame was called during this loop

    // Scale in
    if(alien.scaleT<1){alien.scaleT=Math.min(1,alien.scaleT+rawDt*4);
      alien.mesh.scale.setScalar(alien.r*(1-Math.pow(1-alien.scaleT,3)));}

    // Wobble
    const t=now*.001;const w=alien.wobble;
    if(alien.scaleT>=1){
      const sx=alien.r*(1+Math.sin(t*alien.ps+w)*.08);
      const sy=alien.r*(1+Math.sin(t*alien.ps*1.3+w+1)*.08);
      const sz=alien.r*(1+Math.sin(t*alien.ps*.7+w+2)*.08);
      alien.mesh.scale.set(sx,sy,sz);
    }

    // Rotation
    alien.mesh.rotation.x+=rawDt*.3*Math.sin(t+w);
    alien.mesh.rotation.y+=rawDt*.5;
    alien.mesh.rotation.z+=rawDt*.2*Math.cos(t*.7+w);

    // Approach player (follow terrain height)
    if(alien.approachSpeed>0){
      alien.mesh.position.z+=alien.approachSpeed*dt*3;
      const ax=alien.mesh.position.x,az=alien.mesh.position.z;
      const groundH=getH(ax,az);
      const minY=groundH+alien.r+.5;
      alien.mesh.position.y=Math.max(minY,alien.mesh.position.y+Math.sin(t*2+w)*.2*dt);
      alien.mesh.position.x+=Math.cos(t*1.5+w)*.4*dt;
    }

    // Phantom flicker
    if(alien.type==='phantom'){
      alien.mesh.material.opacity=Math.sin(t*5+w)>.3?.88:.06;
    }

    // If alien gets too close, it damages player
    if(alien.mesh.position.z>camera.position.z-2&&alien.alive&&alien.type!=='powerup'){
      alien.alive=false;clearTimeout(alien.timer);
      if(alien.type==='danger'||alien.type==='boss'){
        if(gameMode==='survival'){loseLife();if(!gameActive)break;}
        combo=0;playDanger();shakeScreen(10);showDmg();
      }else{
        combo=0;misses++;playMiss();
        if(gameMode==='precision'&&misses>=3){endGame();break;}
      }
      popAlien(alien);aliens.splice(ai,1);updateHUD();
    }
  }

  // Update splat particles
  const spDt=rawDt*60*gameSpeed;
  for(let i=splatParts.length-1;i>=0;i--){
    const p=splatParts[i];
    p.mesh.position.x+=p.vx*spDt;
    p.mesh.position.y+=p.vy*spDt;
    p.mesh.position.z+=p.vz*spDt;
    p.vy-=p.grav*rawDt*60;
    p.vx*=.97;p.vy*=.97;p.vz*=.97;
    p.life-=p.decay*gameSpeed;
    p.mesh.material.opacity=Math.max(0,p.life);
    if(p.life<=0){scene.remove(p.mesh);p.mesh.material.dispose();splatParts.splice(i,1);}
  }

  // Update laser beams
  for(let i=laserBeams.length-1;i>=0;i--){
    const lb=laserBeams[i];lb.life-=lb.decay;
    lb.beam.material.opacity=lb.life*.9;lb.glow.material.opacity=lb.life*.2;
    lb.flash.material.opacity=lb.life;lb.flash.scale.setScalar(1+(1-lb.life)*2);
    lb.impact.material.opacity=lb.life;lb.impact.scale.setScalar(1+(1-lb.life)*3);
    lb.il.intensity=lb.life*3;lb.ml.intensity=lb.life*1.5;
    if(lb.life<=0){
      [lb.beam,lb.glow,lb.flash,lb.impact,lb.il,lb.ml].forEach(o=>scene.remove(o));
      lb.beam.geometry.dispose();lb.beam.material.dispose();
      lb.glow.geometry.dispose();lb.glow.material.dispose();
      lb.flash.geometry.dispose();lb.flash.material.dispose();
      lb.impact.geometry.dispose();lb.impact.material.dispose();
      laserBeams.splice(i,1);
    }
  }

  // Update rings
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];r.life-=r.spd*rawDt*60*gameSpeed;
    r.mesh.scale.setScalar(1+(1-r.life)*5);r.mesh.material.opacity=r.life*.6;
    if(r.life<=0){scene.remove(r.mesh);r.mesh.material.dispose();r.mesh.geometry.dispose();rings.splice(i,1);}
  }

  // Camera shake (additive, doesn't override terrain-follow)
  if(screenShake.i>0){
    camera.position.x+=(Math.random()-.5)*screenShake.i*.04;
    camera.position.y+=(Math.random()-.5)*screenShake.i*.04;
    screenShake.i*=.88;if(screenShake.i<.3)screenShake.i=0;
  }

  updateHUD();renderer.render(scene,camera);
}

function endGame(){
  if(!gameActive)return; // prevent double endGame
  gameActive=false;stopMusic();
  document.getElementById('hud').style.display='none';
  document.getElementById('o2Bar').style.display='none';

  // Clean all aliens safely
  for(let i=0;i<aliens.length;i++){
    const a=aliens[i];
    clearTimeout(a.timer);
    if(a.alive){a.alive=false;try{shrinkRemove(a);}catch(e){scene.remove(a.mesh);}}
  }
  aliens=[];
  // Clean lasers
  laserBeams.forEach(lb=>{
    try{[lb.beam,lb.glow,lb.flash,lb.impact,lb.il,lb.ml].forEach(o=>scene.remove(o));
    lb.beam.geometry.dispose();lb.beam.material.dispose();
    lb.glow.geometry.dispose();lb.glow.material.dispose();
    lb.flash.geometry.dispose();lb.flash.material.dispose();
    lb.impact.geometry.dispose();lb.impact.material.dispose();}catch(e){}
  });laserBeams=[];
  // Clean splat particles
  splatParts.forEach(p=>{try{scene.remove(p.mesh);p.mesh.material.dispose();}catch(e){}});splatParts=[];
  rings.forEach(r=>{try{scene.remove(r.mesh);r.mesh.material.dispose();r.mesh.geometry.dispose();}catch(e){}});rings=[];

  const xpG=Math.round(score*.1+hits*2+maxCombo*3+bossesKilled*20);
  PD.xp+=xpG;PD.totalHits+=hits;PD.totalGames++;
  while(PD.xp>=xpFor(PD.level)){PD.xp-=xpFor(PD.level);PD.level++;}
  const isNew=score>(PD.highscores[gameMode]||0);if(isNew)PD.highscores[gameMode]=score;saveD();

  const et=document.getElementById('eTitle');
  if(gameMode==='survival'&&wave>=10){et.textContent='MISSION COMPLETE';et.className='et vic';}
  else{et.textContent='MISSION FAILED';et.className='et def';}

  document.getElementById('fScore').textContent=score.toLocaleString();
  document.getElementById('fCombo').textContent=maxCombo+'x';
  document.getElementById('fHits').textContent=hits;
  const acc=clicks>0?Math.round((hits/clicks)*100):0;
  document.getElementById('fAcc').textContent=acc+'%';
  document.getElementById('fWave').textContent=wave;
  document.getElementById('fBoss').textContent=bossesKilled;
  document.getElementById('xpG').textContent=`+${xpG} XP`;
  document.getElementById('hsEnd').textContent=isNew?`NEW RECORD: ${score.toLocaleString()}`:`BEST: ${(PD.highscores[gameMode]||0).toLocaleString()}`;
  document.getElementById('endScr').classList.remove('hidden');

  if(score>=1000)checkAch('s1k','FOUR DIGITS','1,000+ pts');
  if(score>=5000)checkAch('s5k','MARS VETERAN','5,000+ pts');
  if(acc>=90&&clicks>=20)checkAch('sharp','SHARPSHOOTER','90%+ accuracy');
  if(wave>=10)checkAch('w10','DEEP PATROL','Wave 10');
}

  document.getElementById('hsStart').textContent=t;
  document.getElementById('mLvl').textContent=`RANK ${PD.level}`;
  document.getElementById('mXp').style.width=(PD.xp/xpFor(PD.level)*100)+'%';
}
updateMenu();

document.querySelectorAll('.mc').forEach(c=>c.addEventListener('click',()=>startGame(c.dataset.mode)));
document.getElementById('rBtn').addEventListener('click',()=>startGame(gameMode));
document.getElementById('mBtn').addEventListener('click',()=>{
  document.getElementById('endScr').classList.add('hidden');document.getElementById('startScr').classList.remove('hidden');updateMenu();});
document.getElementById('sndBtn').addEventListener('click',()=>{
  soundEnabled=!soundEnabled;document.getElementById('sndBtn').textContent=soundEnabled?'🔊':'🔇';
  if(!soundEnabled)stopMusic();else if(gameActive)startMusic();});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!gameActive){e.preventDefault();
    if(!document.getElementById('startScr').classList.contains('hidden'))startGame('blitz');else startGame(gameMode);}
  if(e.code==='Escape'&&gameActive)endGame();
  if(e.code==='KeyM'){soundEnabled=!soundEnabled;document.getElementById('sndBtn').textContent=soundEnabled?'🔊':'🔇';
    if(!soundEnabled)stopMusic();else if(gameActive)startMusic();}
});

lastFrame=performance.now();gameLoop();
</script>
</body>
</html>
