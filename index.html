<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEONSTRIKE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00fff2;
    --magenta: #ff00ff;
    --yellow: #ffe600;
    --red: #ff2040;
    --green: #39ff14;
    --blue: #4488ff;
    --orange: #ff8800;
    --bg: #0a0a12;
  }

  body {
    background: var(--bg);
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    color: white;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  canvas#bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  canvas#fxCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  .game-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    cursor: none;
  }

  /* Custom crosshair */
  .crosshair {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    width: 40px; height: 40px;
    transform: translate(-50%, -50%);
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan);
    border-radius: 1px;
  }
  .crosshair::before {
    width: 2px; height: 100%;
    left: 50%; transform: translateX(-50%);
  }
  .crosshair::after {
    height: 2px; width: 100%;
    top: 50%; transform: translateY(-50%);
  }
  .crosshair .dot {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--magenta);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px var(--magenta);
  }
  .crosshair .ring {
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border: 1px solid rgba(0,255,242,0.3);
    border-radius: 50%;
    transition: all 0.1s;
  }
  .crosshair.firing .ring {
    top: -8px; left: -8px; right: -8px; bottom: -8px;
    border-color: var(--yellow);
    box-shadow: 0 0 10px var(--yellow);
  }
  .crosshair.slowmo::before, .crosshair.slowmo::after {
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow), 0 0 16px var(--yellow);
  }

  /* HUD */
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
    pointer-events: none;
  }
  .hud-left, .hud-center, .hud-right {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hud-left { align-items: flex-start; }
  .hud-center { align-items: center; }
  .hud-right { align-items: flex-end; }

  .hud-score {
    font-size: 32px;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan);
    letter-spacing: 3px;
  }
  .hud-level {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .xp-bar {
    width: 140px; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden; margin-top: 2px;
  }
  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    transition: width 0.3s;
    border-radius: 2px;
    box-shadow: 0 0 8px var(--cyan);
  }
  .hud-combo {
    font-size: 20px;
    font-weight: 700;
    color: var(--magenta);
    text-shadow: 0 0 15px var(--magenta);
    transition: all 0.1s;
    min-height: 28px;
  }
  .hud-combo.hot {
    font-size: 26px;
    color: var(--yellow);
    text-shadow: 0 0 30px var(--yellow), 0 0 60px var(--yellow);
  }
  .hud-combo.fire {
    font-size: 32px;
    color: var(--red);
    text-shadow: 0 0 40px var(--red), 0 0 80px var(--red);
    animation: fireShake 0.1s infinite;
  }
  @keyframes fireShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px) rotate(-1deg); }
    75% { transform: translateX(2px) rotate(1deg); }
  }
  .hud-multiplier {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--yellow);
    text-shadow: 0 0 8px var(--yellow);
    opacity: 0.8;
  }
  .hud-timer {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--green);
    text-shadow: 0 0 15px var(--green);
  }
  .hud-timer.danger {
    color: var(--red);
    text-shadow: 0 0 20px var(--red);
    animation: timerPulse 0.5s infinite;
  }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .hud-wave {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .hud-mode {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 3px;
    opacity: 0.6;
  }
  .hud-lives {
    display: flex; gap: 6px; margin-top: 4px;
  }
  .life-pip {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: all 0.3s;
  }
  .life-pip.lost {
    background: rgba(255,32,64,0.3);
    box-shadow: none;
  }

  /* Targets */
  .target {
    position: absolute;
    border-radius: 50%;
    cursor: none;
    z-index: 5;
    animation: targetSpawn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes targetSpawn {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .target-normal {
    width: 60px; height: 60px;
    background: radial-gradient(circle at 35% 35%, var(--cyan), #006a6a);
    box-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,255,242,0.3), inset 0 0 15px rgba(255,255,255,0.2);
    border: 2px solid rgba(0,255,242,0.8);
  }
  .target-fast {
    width: 38px; height: 38px;
    background: radial-gradient(circle at 35% 35%, var(--magenta), #6a0066);
    box-shadow: 0 0 20px var(--magenta), 0 0 40px rgba(255,0,255,0.3), inset 0 0 15px rgba(255,255,255,0.2);
    border: 2px solid rgba(255,0,255,0.8);
    animation: targetSpawn 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), fastPulse 0.4s infinite;
  }
  @keyframes fastPulse {
    0%, 100% { box-shadow: 0 0 20px var(--magenta), 0 0 40px rgba(255,0,255,0.3); }
    50% { box-shadow: 0 0 30px var(--magenta), 0 0 60px rgba(255,0,255,0.5); }
  }
  .target-bonus {
    width: 50px; height: 50px;
    background: radial-gradient(circle at 35% 35%, var(--yellow), #6a5a00);
    box-shadow: 0 0 25px var(--yellow), 0 0 50px rgba(255,230,0,0.4), inset 0 0 15px rgba(255,255,255,0.3);
    border: 2px solid rgba(255,230,0,0.9);
    animation: targetSpawn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), bonusSpin 2s linear infinite;
  }
  @keyframes bonusSpin {
    0% { border-radius: 50%; } 25% { border-radius: 40% 60% 60% 40%; }
    50% { border-radius: 50%; } 75% { border-radius: 60% 40% 40% 60%; } 100% { border-radius: 50%; }
  }
  .target-danger {
    width: 70px; height: 70px;
    background: radial-gradient(circle at 35% 35%, var(--red), #400010);
    box-shadow: 0 0 25px var(--red), 0 0 50px rgba(255,32,64,0.4), inset 0 0 15px rgba(255,255,255,0.15);
    border: 2px solid rgba(255,32,64,0.8);
    animation: targetSpawn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), dangerPulse 0.6s infinite;
  }
  .target-danger::after {
    content: '\2715'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); font-size: 28px;
    color: rgba(255,255,255,0.8); text-shadow: 0 0 10px var(--red);
  }
  @keyframes dangerPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .target-phantom {
    width: 55px; height: 55px;
    background: radial-gradient(circle at 35% 35%, var(--blue), #001a44);
    box-shadow: 0 0 20px var(--blue), 0 0 40px rgba(68,136,255,0.3), inset 0 0 15px rgba(255,255,255,0.15);
    border: 2px solid rgba(68,136,255,0.6);
    animation: targetSpawn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), phantomFlicker 0.8s ease-in-out infinite;
  }
  @keyframes phantomFlicker { 0%, 100% { opacity: 1; } 40% { opacity: 0.12; } 60% { opacity: 0.12; } }
  .target-splitter {
    width: 65px; height: 65px;
    background: radial-gradient(circle at 35% 35%, var(--orange), #4a2a00);
    box-shadow: 0 0 20px var(--orange), 0 0 40px rgba(255,136,0,0.3), inset 0 0 15px rgba(255,255,255,0.2);
    border: 2px solid rgba(255,136,0,0.8);
  }
  .target-splitter::after {
    content: '\25C8'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); font-size: 22px; color: rgba(255,255,255,0.7);
  }
  .target-child {
    width: 32px; height: 32px;
    background: radial-gradient(circle at 35% 35%, var(--orange), #4a2a00);
    box-shadow: 0 0 15px var(--orange), 0 0 30px rgba(255,136,0,0.2), inset 0 0 10px rgba(255,255,255,0.15);
    border: 1px solid rgba(255,136,0,0.7);
  }
  .target-boss {
    width: 100px; height: 100px;
    background: radial-gradient(circle at 35% 35%, #ff00aa, #440033);
    box-shadow: 0 0 40px #ff00aa, 0 0 80px rgba(255,0,170,0.4), inset 0 0 20px rgba(255,255,255,0.15);
    border: 3px solid rgba(255,0,170,0.8);
    animation: targetSpawn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), bossPulse 1s infinite;
  }
  .boss-hp {
    position: absolute; bottom: -12px; left: 10%; right: 10%;
    height: 5px; background: rgba(0,0,0,0.6); border-radius: 3px; overflow: hidden;
  }
  .boss-hp-fill {
    height: 100%; background: linear-gradient(90deg, var(--red), var(--magenta));
    transition: width 0.15s; border-radius: 3px; box-shadow: 0 0 6px var(--magenta);
  }
  @keyframes bossPulse {
    0%, 100% { box-shadow: 0 0 40px #ff00aa, 0 0 80px rgba(255,0,170,0.4); }
    50% { box-shadow: 0 0 60px #ff00aa, 0 0 100px rgba(255,0,170,0.6); }
  }
  .target-powerup {
    width: 45px; height: 45px;
    background: radial-gradient(circle at 35% 35%, var(--green), #003300);
    box-shadow: 0 0 25px var(--green), 0 0 50px rgba(57,255,20,0.4), inset 0 0 15px rgba(255,255,255,0.3);
    border: 2px solid rgba(57,255,20,0.9);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    animation: targetSpawn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), puFloat 1.5s ease-in-out infinite;
  }
  @keyframes puFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .target .shrink-ring {
    position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
    border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
    animation: shrinkRing var(--lifetime) linear forwards;
  }
  @keyframes shrinkRing { 0% { transform: scale(1.5); opacity: 0.8; } 100% { transform: scale(0.3); opacity: 0; } }

  .hit-text {
    position: absolute; z-index: 20;
    font-family: 'Orbitron', monospace; font-weight: 900; font-size: 24px;
    pointer-events: none; animation: hitFloat 0.8s ease-out forwards;
  }
  @keyframes hitFloat {
    0% { transform: translateY(0) scale(1.5); opacity: 1; }
    100% { transform: translateY(-80px) scale(0.5); opacity: 0; }
  }
  .screen-flash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 50; pointer-events: none; opacity: 0;
  }
  .screen-flash.active { animation: flash 0.15s ease-out; }
  @keyframes flash { 0% { opacity: 0.4; } 100% { opacity: 0; } }
  .slowmo-vignette {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 3; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(255,230,0,0.15) 100%);
    opacity: 0; transition: opacity 0.3s;
  }
  .slowmo-vignette.active { opacity: 1; }
  .miss-x {
    position: absolute; z-index: 15; pointer-events: none;
    font-size: 30px; color: var(--red); text-shadow: 0 0 10px var(--red);
    animation: missFloat 0.5s ease-out forwards;
  }
  @keyframes missFloat { 0% { opacity: 1; transform: scale(1.5); } 100% { opacity: 0; transform: scale(0.5) translateY(-30px); } }

  .combo-banner {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 60; font-size: clamp(40px, 8vw, 80px);
    font-weight: 900; letter-spacing: 6px;
    pointer-events: none; opacity: 0; white-space: nowrap;
  }
  .combo-banner.show { animation: comboBurst 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes comboBurst {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2) rotate(2deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); opacity: 0; }
  }
  .wave-banner {
    position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
    z-index: 70; text-align: center; pointer-events: none; opacity: 0;
  }
  .wave-banner.show { animation: waveFade 1.5s ease-out forwards; }
  .wave-banner .wave-num {
    font-size: clamp(60px, 12vw, 120px); font-weight: 900;
    color: var(--cyan); text-shadow: 0 0 40px var(--cyan), 0 0 80px var(--cyan); line-height: 1;
  }
  .wave-banner .wave-label {
    font-family: 'Share Tech Mono', monospace; font-size: 16px;
    color: rgba(255,255,255,0.5); letter-spacing: 8px; text-transform: uppercase;
  }
  @keyframes waveFade {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
  }

  .achievement {
    position: fixed; top: 80px; right: 20px; z-index: 90;
    background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(20,20,40,0.9));
    border: 1px solid var(--yellow); border-radius: 8px;
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 0 30px rgba(255,230,0,0.3);
    animation: achieveSlide 3s ease-in-out forwards; pointer-events: none;
  }
  .achievement .ach-icon { font-size: 28px; }
  .achievement .ach-text {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--yellow); letter-spacing: 1px;
  }
  .achievement .ach-name {
    font-family: 'Orbitron', monospace; font-weight: 700; font-size: 14px;
    color: white; display: block; margin-bottom: 2px;
  }
  @keyframes achieveSlide {
    0% { transform: translateX(120%); opacity: 0; }
    10% { transform: translateX(0); opacity: 1; }
    85% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(120%); opacity: 0; }
  }

  .grid-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,242,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,242,0.03) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none;
  }
  .scanlines {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 4; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* ============ MENUS ============ */
  .screen-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,10,18,0.95); backdrop-filter: blur(20px); cursor: default;
  }
  .screen-overlay.hidden { display: none; }
  .title {
    font-size: clamp(48px, 10vw, 100px); font-weight: 900; letter-spacing: 8px;
    background: linear-gradient(135deg, var(--cyan), var(--magenta), var(--yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,242,0.5));
    animation: titleGlow 3s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(0,255,242,0.5)); }
    33% { filter: drop-shadow(0 0 30px rgba(255,0,255,0.5)); }
    66% { filter: drop-shadow(0 0 30px rgba(255,230,0,0.5)); }
  }
  .subtitle {
    font-family: 'Share Tech Mono', monospace; font-size: clamp(12px, 2vw, 18px);
    color: rgba(255,255,255,0.4); margin-top: 12px; letter-spacing: 6px; text-transform: uppercase;
  }
  .mode-select {
    display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; justify-content: center;
  }
  .mode-card {
    width: 160px; padding: 20px 16px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,242,0.15);
    border-radius: 4px; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .mode-card:hover {
    border-color: var(--cyan); background: rgba(0,255,242,0.05);
    transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,255,242,0.2);
  }
  .mode-card .mode-icon { font-size: 32px; margin-bottom: 10px; }
  .mode-card .mode-name { font-size: 16px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
  .mode-card .mode-desc {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: rgba(255,255,255,0.4); letter-spacing: 1px; line-height: 1.5;
  }
  .mode-card.blitz .mode-name { color: var(--cyan); }
  .mode-card.survival .mode-name { color: var(--red); }
  .mode-card.zen .mode-name { color: var(--green); }
  .mode-card.precision .mode-name { color: var(--yellow); }

  .highscore-display {
    margin-top: 24px; font-family: 'Share Tech Mono', monospace; font-size: 13px;
    color: var(--yellow); text-shadow: 0 0 10px var(--yellow);
    letter-spacing: 2px; text-align: center; line-height: 1.8;
  }
  .player-level { margin-top: 20px; text-align: center; }
  .player-level .level-text {
    font-size: 13px; color: var(--magenta); letter-spacing: 3px; text-shadow: 0 0 10px var(--magenta);
  }
  .xp-bar-large {
    width: 200px; height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; margin: 6px auto 0; overflow: hidden;
  }
  .xp-bar-large .fill {
    height: 100%; background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border-radius: 3px; box-shadow: 0 0 8px var(--cyan);
  }

  .end-title { font-size: clamp(36px, 8vw, 72px); font-weight: 900; letter-spacing: 6px; }
  .end-title.victory {
    background: linear-gradient(135deg, var(--yellow), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,230,0,0.5));
  }
  .end-title.defeat {
    background: linear-gradient(135deg, var(--red), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,32,64,0.5));
  }
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    margin-top: 28px; width: min(480px, 92vw);
  }
  .stat-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,242,0.1);
    padding: 14px; text-align: center; border-radius: 4px;
  }
  .stat-card .label {
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase;
  }
  .stat-card .value {
    font-size: 24px; font-weight: 900; margin-top: 4px;
    color: var(--cyan); text-shadow: 0 0 15px var(--cyan);
  }
  .stat-card .value.magenta { color: var(--magenta); text-shadow: 0 0 15px var(--magenta); }
  .stat-card .value.yellow { color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }
  .stat-card .value.green { color: var(--green); text-shadow: 0 0 15px var(--green); }
  .stat-card .value.red { color: var(--red); text-shadow: 0 0 15px var(--red); }

  .xp-gain {

</style>

<script>
// ========== BACKGROUND ==========
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
const fxCanvas = document.getElementById('fxCanvas');
const fxCtx = fxCanvas.getContext('2d');

function resizeCanvases() {
  bgCanvas.width = fxCanvas.width = window.innerWidth;
  bgCanvas.height = fxCanvas.height = window.innerHeight;
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

const bgP = [];
for (let i = 0; i < 100; i++) {
  bgP.push({
    x: Math.random() * innerWidth, y: Math.random() * innerHeight,
    vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
    r: Math.random()*2+0.5,
    color: ['#00fff2','#ff00ff','#ffe600','#4488ff'][Math.floor(Math.random()*4)],
    alpha: Math.random()*0.4+0.1
  });
}

function drawBg() {
  bgCtx.fillStyle = 'rgba(10,10,18,0.12)';
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  bgP.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x<0)p.x=bgCanvas.width; if(p.x>bgCanvas.width)p.x=0;
    if(p.y<0)p.y=bgCanvas.height; if(p.y>bgCanvas.height)p.y=0;
    bgCtx.beginPath(); bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle=p.color; bgCtx.globalAlpha=p.alpha; bgCtx.fill(); bgCtx.globalAlpha=1;
  });
  bgCtx.strokeStyle='rgba(0,255,242,0.03)'; bgCtx.lineWidth=0.5;
  for(let i=0;i<bgP.length;i++) for(let j=i+1;j<bgP.length;j++){
    const dx=bgP[i].x-bgP[j].x, dy=bgP[i].y-bgP[j].y;
    if(dx*dx+dy*dy<12000){bgCtx.beginPath();bgCtx.moveTo(bgP[i].x,bgP[i].y);bgCtx.lineTo(bgP[j].x,bgP[j].y);bgCtx.stroke();}
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ========== FX CANVAS ==========
let fxParts = [], cursorTrail = [];

function hexToRgba(hex){
  return `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},`;
}

function drawFx(){
  fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
  for(let i=cursorTrail.length-1;i>=0;i--){
    const t=cursorTrail[i]; t.life-=0.03;
    if(t.life<=0){cursorTrail.splice(i,1);continue;}
    fxCtx.beginPath(); fxCtx.arc(t.x,t.y,t.life*3,0,Math.PI*2);
    fxCtx.fillStyle=`rgba(0,255,242,${t.life*0.3})`; fxCtx.fill();
  }
  for(let i=fxParts.length-1;i>=0;i--){
    const p=fxParts[i];
    p.x+=p.vx*gameSpeed; p.y+=p.vy*gameSpeed; p.vy+=0.3*gameSpeed; p.life-=0.025*gameSpeed; p.vx*=0.98;
    if(p.life<=0){fxParts.splice(i,1);continue;}
    fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    fxCtx.fillStyle=p.rgba+p.life+')';
    fxCtx.shadowBlur=8; fxCtx.shadowColor=p.rgba+'1)'; fxCtx.fill(); fxCtx.shadowBlur=0;
  }
  requestAnimationFrame(drawFx);
}
drawFx();

function spawnFxExplosion(x,y,color,count=15){
  const rgba=hexToRgba(color);
  for(let i=0;i<count;i++){
    const angle=(Math.PI*2/count)*i+Math.random()*0.5;
    const speed=2+Math.random()*6+combo*0.3;
    fxParts.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,life:1,size:2+Math.random()*4,rgba});
  }
}

// ========== CROSSHAIR ==========
const crosshair = document.getElementById('crosshair');
document.addEventListener('mousemove', e => {
  crosshair.style.left=e.clientX+'px'; crosshair.style.top=e.clientY+'px';
  if(gameActive) { cursorTrail.push({x:e.clientX,y:e.clientY,life:1}); if(cursorTrail.length>20)cursorTrail.shift(); }
});

// ========== STATE ==========
let score=0,combo=0,maxCombo=0,hits=0,misses=0,clicks=0;
let timeLeft=30,wave=1,lives=5,bossesKilled=0;
let gameActive=false,gameMode='blitz',gameSpeed=1;
let targets=[],spawnAccum=0,lastFrame=0;
let activePowerups={},screenShake={x:0,y:0,intensity:0};
let soundEnabled=true,musicPlaying=false,musicNodes=[];
let totalHitsInWave=0;

let PD=JSON.parse(localStorage.getItem('nsData')||'null')||{
  level:1,xp:0,highscores:{blitz:0,survival:0,zen:0,precision:0},
  totalHits:0,totalGames:0,achievements:[]
};
function saveD(){localStorage.setItem('nsData',JSON.stringify(PD));}
function xpFor(l){return 100+(l-1)*60;}

const gameLayer=document.getElementById('gameLayer');
const hud=document.getElementById('hud');
const scoreDisplay=document.getElementById('scoreDisplay');
const comboDisplay=document.getElementById('comboDisplay');
const multiplierDisplay=document.getElementById('multiplierDisplay');
const timerDisplay=document.getElementById('timerDisplay');
const screenFlash=document.getElementById('screenFlash');
const slowmoVignette=document.getElementById('slowmoVignette');
const comboBanner=document.getElementById('comboBanner');
const waveBanner=document.getElementById('waveBanner');
const waveNum=document.getElementById('waveNum');
const livesDisplay=document.getElementById('livesDisplay');
const waveDisplay=document.getElementById('waveDisplay');
const modeDisplay=document.getElementById('modeDisplay');

// ========== AUDIO ==========
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

function playHit(freq=800){
  if(!audioCtx||!soundEnabled)return;
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='square'; o.frequency.setValueAtTime(freq,t); o.frequency.exponentialRampToValueAtTime(freq*2,t+0.05);
  g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.start();o.stop(t+0.12);
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.connect(g2);g2.connect(audioCtx.destination);
  o2.type='sine'; o2.frequency.setValueAtTime(freq*1.5,t); o2.frequency.exponentialRampToValueAtTime(freq*3,t+0.08);
  g2.gain.setValueAtTime(0.05,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  o2.start();o2.stop(t+0.08);
}
function playMiss(){
  if(!audioCtx||!soundEnabled)return; const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(60,t+0.25);
  g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o.start();o.stop(t+0.25);
}
function playCombo(){
  if(!audioCtx||!soundEnabled)return; const t=audioCtx.currentTime;
  [600,900,1200,1600].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination); o.type='sine';
    o.frequency.setValueAtTime(f,t+i*0.05);
    g.gain.setValueAtTime(0.08,t+i*0.05); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.15);
    o.start(t+i*0.05);o.stop(t+i*0.05+0.15);
  });
}
function playDanger(){
  if(!audioCtx||!soundEnabled)return; const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sawtooth'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(40,t+0.35);
  g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.start();o.stop(t+0.35);
}
function playBossHit(){
  if(!audioCtx||!soundEnabled)return; const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='square'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(300,t+0.1);
  g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  o.start();o.stop(t+0.2);
}
function playBossDie(){
  if(!audioCtx||!soundEnabled)return; const t=audioCtx.currentTime;
  for(let i=0;i<6;i++){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=i%2===0?'square':'sawtooth';
    o.frequency.setValueAtTime(200+i*150,t+i*0.06);
    o.frequency.exponentialRampToValueAtTime(50+i*50,t+i*0.06+0.15);
    g.gain.setValueAtTime(0.1,t+i*0.06); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.15);
    o.start(t+i*0.06);o.stop(t+i*0.06+0.15);
  }
}
function playPowerup(){
  if(!audioCtx||!soundEnabled)return; const t=audioCtx.currentTime;
  [400,600,800,1000,1200].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination); o.type='sine';
    o.frequency.setValueAtTime(f,t+i*0.04);
    g.gain.setValueAtTime(0.07,t+i*0.04); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.04+0.12);
    o.start(t+i*0.04);o.stop(t+i*0.04+0.12);
  });
}

// ========== PROCEDURAL MUSIC ==========
function startMusic(){
  if(!audioCtx||!soundEnabled||musicPlaying)return; musicPlaying=true;
  const bpm=140, beatLen=60/bpm;
  const bassNotes=[55,55,73.4,65.4,55,55,82.4,73.4];
  let beat=0;
  function tick(){
    if(!musicPlaying)return;
    const t=audioCtx.currentTime+0.05;
    const b=beat%8;
    // Kick
    if(b%2===0){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination); o.type='sine';
      o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(30,t+0.15);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.start(t);o.stop(t+0.15); musicNodes.push(o);
    }
    // Hat
    {const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const n=audioCtx.createBufferSource(); n.buffer=buf;
    const hp=audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
    const g=audioCtx.createGain(); g.gain.setValueAtTime(b%2===0?0.04:0.02,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    n.connect(hp);hp.connect(g);g.connect(audioCtx.destination);
    n.start(t);n.stop(t+0.05);}
    // Bass
    if(b%2===0){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination); o.type='sawtooth';
      o.frequency.setValueAtTime(bassNotes[b],t);
      g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.start(t);o.stop(t+0.2); musicNodes.push(o);
    }
    // Arp on combo
    if(combo>=5&&b%2===1){
      const arpN=[220,330,440,550,660];
      const note=arpN[b%arpN.length]*(1+Math.floor(combo/10)*0.25);
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination); o.type='triangle';
      o.frequency.setValueAtTime(Math.min(note,2000),t);
      g.gain.setValueAtTime(0.03+Math.min(combo*0.002,0.05),t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
      o.start(t);o.stop(t+0.1);
    }
    beat++;
    if(musicPlaying)setTimeout(tick,beatLen*1000*gameSpeed);
  }
  tick();
}
function stopMusic(){musicPlaying=false;musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];}

// ========== TARGETS ==========
const TT={
  normal:  {cls:'target-normal',  pts:10,  life:2200,freq:800, color:'#00fff2',sz:60},
  fast:    {cls:'target-fast',    pts:25,  life:1000,freq:1200,color:'#ff00ff',sz:38},
  bonus:   {cls:'target-bonus',   pts:50,  life:1500,freq:600, color:'#ffe600',sz:50},
  danger:  {cls:'target-danger',  pts:-30, life:2800,freq:0,   color:'#ff2040',sz:70},
  phantom: {cls:'target-phantom', pts:35,  life:1800,freq:1000,color:'#4488ff',sz:55},
  splitter:{cls:'target-splitter',pts:20,  life:2000,freq:900, color:'#ff8800',sz:65},
};

const PU_TYPES={
  slowmo: {icon:'⏳',name:'SLOW-MO', dur:4000,color:'#ffe600'},
  nuke:   {icon:'💥',name:'NUKE',    dur:0,   color:'#ff2040'},
  timeplus:{icon:'⏱️',name:'TIME+5', dur:0,   color:'#39ff14'},
  multi:  {icon:'🔥',name:'MULTI',   dur:5000,color:'#ff00ff'},
  shield: {icon:'🛡️',name:'SHIELD',  dur:6000,color:'#4488ff'},
};

function pickType(){
  const r=Math.random();
  const dc=Math.min(0.10+wave*0.015,0.22);
  const fc=Math.min(0.12+wave*0.025,0.35);
  const pc=wave>=2?Math.min(0.08+wave*0.01,0.15):0;
  const sc=wave>=3?Math.min(0.06+wave*0.01,0.12):0;
  let c=0;
  c+=dc; if(r<c)return'danger';
  c+=0.07; if(r<c)return'bonus';
  c+=pc; if(r<c)return'phantom';
  c+=sc; if(r<c)return'splitter';
  c+=fc; if(r<c)return'fast';
  return'normal';
}

function getMovement(){
  if(wave<2)return null;
  if(Math.random()>Math.min(0.15+wave*0.06,0.5))return null;
  const pats=['linear','sine','circle'];
  return{pattern:pats[Math.floor(Math.random()*pats.length)],
    speed:(0.5+Math.random()*1.5)*(1+wave*0.1),
    angle:Math.random()*Math.PI*2, phase:Math.random()*Math.PI*2,
    radius:20+Math.random()*40, ox:0,oy:0};
}

function spawnTarget(type,x,y,lifeOvr,isChild){
  if(!gameActive)return;
  if(!type)type=pickType();
  const cfg=TT[type];
  const life=lifeOvr||cfg.life*Math.max(0.4,1-wave*0.04);
  const el=document.createElement('div');
  el.className='target '+(isChild?'target-child':cfg.cls);
  el.style.setProperty('--lifetime',life+'ms');
  const pad=90, hs=(isChild?16:cfg.sz/2);
  if(x==null) x=pad+Math.random()*(innerWidth-pad*2);
  if(y==null) y=pad+60+Math.random()*(innerHeight-pad*2-60);
  el.style.left=(x-hs)+'px'; el.style.top=(y-hs)+'px';
  const ring=document.createElement('div'); ring.className='shrink-ring';
  ring.style.setProperty('--lifetime',life+'ms'); el.appendChild(ring);
  const mv=isChild?null:getMovement();
  if(mv){mv.ox=x;mv.oy=y;}
  const tObj={el,type,cfg,x,y,alive:true,spawn:performance.now(),life,mv,hs,isChild};
  el.addEventListener('pointerdown',e=>{e.stopPropagation();if(!tObj.alive)return;hitTarget(tObj);});
  tObj.timer=setTimeout(()=>{if(!tObj.alive)return;expireTarget(tObj);},life/gameSpeed);
  targets.push(tObj); gameLayer.appendChild(el); return tObj;
}

function spawnBoss(){
  if(!gameActive)return;
  const hp=3+Math.floor(wave/2);
  const x=100+Math.random()*(innerWidth-200), y=100+Math.random()*(innerHeight-250);
  const el=document.createElement('div'); el.className='target target-boss';
  el.style.left=(x-50)+'px'; el.style.top=(y-50)+'px';
  el.style.setProperty('--lifetime','8000ms');
  const ring=document.createElement('div'); ring.className='shrink-ring';
  ring.style.setProperty('--lifetime','8000ms'); el.appendChild(ring);
  const hpBar=document.createElement('div'); hpBar.className='boss-hp';
  const hpFill=document.createElement('div'); hpFill.className='boss-hp-fill'; hpFill.style.width='100%';
  hpBar.appendChild(hpFill); el.appendChild(hpBar);
  const mv={pattern:'sine',speed:0.8+wave*0.15,angle:Math.random()*Math.PI*2,phase:0,radius:30,ox:x,oy:y};
  const tObj={el,type:'boss',cfg:{pts:100+wave*20,color:'#ff00aa',sz:100},x,y,alive:true,spawn:performance.now(),life:8000,mv,hs:50,hp,maxHp:hp,hpFill,isChild:false};

  el.addEventListener('pointerdown',e=>{
    e.stopPropagation(); if(!tObj.alive)return;
    tObj.hp--; clicks++; hits++;
    tObj.hpFill.style.width=(tObj.hp/tObj.maxHp*100)+'%';
    playBossHit(); shakeScreen(4); spawnFxExplosion(tObj.x,tObj.y,'#ff00aa',8); flashScreen('#ff00aa');
    combo++; if(combo>maxCombo)maxCombo=combo;
    const m=getMult(), pts=Math.round(15*m); score+=pts;
    showHitText(tObj.x,tObj.y,pts,'#ff00aa');
    if(tObj.hp<=0){
      tObj.alive=false; bossesKilled++;
      const bp=Math.round(tObj.cfg.pts*m); score+=bp;
      playBossDie(); shakeScreen(12); spawnFxExplosion(tObj.x,tObj.y,'#ff00aa',40);
      flashScreen('#ff00aa'); showHitText(tObj.x,tObj.y-30,bp,'#ffe600');
      showBanner('BOSS DESTROYED','#ff00aa');
      checkAch('bossSlayer','BOSS SLAYER','Destroyed a boss');
      el.remove(); spawnPU(tObj.x,tObj.y,true);
    }
    updateHUD();
  });

  tObj.timer=setTimeout(()=>{
    if(!tObj.alive)return; tObj.alive=false;
    if(gameMode==='survival')loseLife(); else{combo=0;misses++;}
    playDanger(); showMiss(tObj.x,tObj.y);
    el.style.transition='opacity 0.3s,transform 0.3s'; el.style.opacity='0'; el.style.transform='scale(0.3)';
    setTimeout(()=>el.remove(),300); updateHUD();
  },8000/gameSpeed);

  targets.push(tObj); gameLayer.appendChild(el);
}

function spawnPU(x,y,guaranteed){
  if(!guaranteed&&Math.random()>0.35)return;
  let types=Object.keys(PU_TYPES);
  if(gameMode!=='blitz')types=types.filter(t=>t!=='timeplus');
  if(gameMode==='zen')types=types.filter(t=>t!=='shield');
  const puType=types[Math.floor(Math.random()*types.length)];
  const el=document.createElement('div'); el.className='target target-powerup';
  el.style.left=(x-22)+'px'; el.style.top=(y-22)+'px';
  el.style.setProperty('--lifetime','3000ms');
  el.textContent=PU_TYPES[puType].icon;
  const ring=document.createElement('div'); ring.className='shrink-ring';
  ring.style.setProperty('--lifetime','3000ms'); el.appendChild(ring);
  const tObj={el,type:'powerup',puType,cfg:{pts:0,color:'#39ff14',sz:45},x,y,alive:true,spawn:performance.now(),life:3000,hs:22,mv:null,isChild:false};
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation(); if(!tObj.alive)return; tObj.alive=false; clicks++;
    activatePU(puType); playPowerup(); spawnFxExplosion(x,y,'#39ff14',12); flashScreen('#39ff14'); el.remove();
  });
  tObj.timer=setTimeout(()=>{
    if(!tObj.alive)return; tObj.alive=false;
    el.style.transition='opacity 0.2s'; el.style.opacity='0'; setTimeout(()=>el.remove(),200);
  },3000);
  targets.push(tObj); gameLayer.appendChild(el);
}

// ========== HIT/MISS ==========
function hitTarget(t){
  t.alive=false; clearTimeout(t.timer);
  const{x,y,type,cfg}=t; clicks++;

  if(type==='danger'){
    if(activePowerups.shield){
      showHitText(x,y,'BLOCKED','#4488ff'); spawnFxExplosion(x,y,'#4488ff',10); playHit(400);
    }else{
      combo=0;
      if(gameMode==='survival')loseLife();
      else if(gameMode==='precision'){misses++;if(misses>=3){endGame();return;}}
      else{score=Math.max(0,score+cfg.pts);}
      playDanger(); showHitText(x,y,cfg.pts,'#ff2040'); flashScreen('#ff2040'); shakeScreen(8); spawnFxExplosion(x,y,'#ff2040',20);
    }
  }else{
    hits++; totalHitsInWave++; combo++; if(combo>maxCombo)maxCombo=combo;
    const m=getMult(), pts=Math.round(cfg.pts*m); score+=pts;
    playHit(cfg.freq); showHitText(x,y,pts,cfg.color);
    spawnFxExplosion(x,y,cfg.color,12+Math.floor(combo/3)*3);
    flashScreen(cfg.color);
    if(combo>=5)shakeScreen(2+Math.min(combo*0.3,6));
    checkComboMilestone();
    if(activePowerups.multi){
      targets.forEach(o=>{
        if(o.alive&&o!==t&&o.type!=='danger'&&o.type!=='boss'&&o.type!=='powerup'){
          const dx=o.x-x,dy=o.y-y;
          if(dx*dx+dy*dy<22500)setTimeout(()=>{if(o.alive)hitTarget(o);},50);
        }
      });
    }
    if(type==='splitter'&&!t.isChild){
      [[-30,-15],[30,-15]].forEach(([ox,oy])=>spawnTarget('normal',x+ox,y+oy,1500,true));
    }
    if(Math.random()<0.04+wave*0.005)spawnPU(x,y,false);
  }
  updateHUD(); t.el.remove();
}

function expireTarget(t){
  if(!t.alive)return; t.alive=false;
  if(t.type!=='danger'&&t.type!=='powerup'){
    combo=0; misses++;
    if(gameMode==='precision'&&misses>=3){endGame();return;}
    playMiss(); showMiss(t.x,t.y);
  }
  updateHUD();
  t.el.style.transition='opacity 0.2s,transform 0.2s'; t.el.style.opacity='0'; t.el.style.transform='scale(0.3)';
  setTimeout(()=>t.el.remove(),200);
}

function loseLife(){lives--;shakeScreen(10);if(lives<=0)endGame();}

// ========== POWERUPS ==========
function activatePU(type){
  const pu=PU_TYPES[type]; showBanner(pu.name,pu.color);
  if(type==='nuke'){
    targets.forEach(t=>{
      if(t.alive&&t.type!=='danger'&&t.type!=='boss'&&t.type!=='powerup'){
        t.alive=false; clearTimeout(t.timer); hits++; combo++;
        score+=Math.round(t.cfg.pts*getMult());
        spawnFxExplosion(t.x,t.y,t.cfg.color,8); t.el.remove();
      }
    });
    if(combo>maxCombo)maxCombo=combo;
    shakeScreen(15); flashScreen('#ff2040'); updateHUD(); return;
  }
  if(type==='timeplus'){timeLeft=Math.min(timeLeft+5,60);updateHUD();return;}
  activePowerups[type]=true;
  if(type==='slowmo'){gameSpeed=0.4;slowmoVignette.classList.add('active');crosshair.classList.add('slowmo');}
  setTimeout(()=>{
    delete activePowerups[type];
    if(type==='slowmo'){gameSpeed=1;slowmoVignette.classList.remove('active');crosshair.classList.remove('slowmo');}
  },pu.dur);
}

// ========== EFFECTS ==========
function getMult(){return 1+Math.floor(combo/5)*0.5;}

function showHitText(x,y,pts,color){
  const el=document.createElement('div'); el.className='hit-text';
  el.style.left=x+'px'; el.style.top=y+'px'; el.style.color=color;
  el.style.textShadow=`0 0 20px ${color}`;
  if(typeof pts==='string')el.textContent=pts;
  else{el.textContent=(pts>0?'+':'')+pts; if(combo>=5)el.textContent+=` x${combo}`; if(combo>=15)el.style.fontSize='32px';}
  gameLayer.appendChild(el); setTimeout(()=>el.remove(),800);
}
function showMiss(x,y){
  const el=document.createElement('div'); el.className='miss-x';
  el.style.left=x+'px'; el.style.top=y+'px'; el.textContent='MISS';
  gameLayer.appendChild(el); setTimeout(()=>el.remove(),500);
}
function flashScreen(c){
  screenFlash.style.background=c; screenFlash.classList.remove('active');
  void screenFlash.offsetWidth; screenFlash.classList.add('active');
}
function shakeScreen(i){screenShake.intensity=Math.max(screenShake.intensity,i);}
function showBanner(text,color){
  comboBanner.textContent=text; comboBanner.style.color=color;
  comboBanner.style.textShadow=`0 0 40px ${color}, 0 0 80px ${color}`;
  comboBanner.classList.remove('show'); void comboBanner.offsetWidth; comboBanner.classList.add('show');
}

function checkComboMilestone(){
  const ms=[
    {at:10,text:'UNSTOPPABLE',color:'#00fff2'},
    {at:20,text:'GODLIKE',color:'#ff00ff'},
    {at:30,text:'LEGENDARY',color:'#ffe600'},
    {at:50,text:'NEONLORD',color:'#ff2040'},
    {at:75,text:'TRANSCENDENT',color:'#39ff14'},
    {at:100,text:'INFINITE',color:'#ffffff'},
  ];
  const m=ms.find(m=>m.at===combo);
  if(m){playCombo();showBanner(m.text,m.color);shakeScreen(8);
    if(combo>=50)checkAch('neonlord','NEONLORD','Reached 50x combo');
    if(combo>=100)checkAch('infinite','THE INFINITE','Reached 100x combo');
  }
}

// ========== ACHIEVEMENTS ==========
function checkAch(id,name,desc){
  if(PD.achievements.includes(id))return;
  PD.achievements.push(id); saveD();
  const el=document.createElement('div'); el.className='achievement';
  el.innerHTML=`<div class="ach-icon">🏆</div><div class="ach-text"><span class="ach-name">${name}</span>${desc}</div>`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),3500);
}

// ========== HUD ==========
function updateHUD(){
  scoreDisplay.textContent=score.toLocaleString();
  const m=getMult();
  multiplierDisplay.textContent=m>1?`×${m.toFixed(1)} MULTIPLIER`:'';
  if(combo>=15){comboDisplay.className='hud-combo fire';comboDisplay.textContent=`${combo}x COMBO`;}
  else if(combo>=5){comboDisplay.className='hud-combo hot';comboDisplay.textContent=`${combo}x COMBO`;}
  else if(combo>=2){comboDisplay.className='hud-combo';comboDisplay.textContent=`${combo}x`;}
  else{comboDisplay.className='hud-combo';comboDisplay.textContent='';}

  if(gameMode==='blitz'){
    timerDisplay.textContent=timeLeft.toFixed(1);
    timerDisplay.className=timeLeft<=5?'hud-timer danger':'hud-timer';
    timerDisplay.style.display='';
  }else timerDisplay.style.display='none';

  waveDisplay.textContent=`WAVE ${wave}`;

  if(gameMode==='survival'){
    livesDisplay.innerHTML=''; livesDisplay.style.display='flex';
    for(let i=0;i<5;i++){const p=document.createElement('div');p.className='life-pip'+(i>=lives?' lost':'');livesDisplay.appendChild(p);}
  }else if(gameMode==='precision'){
    livesDisplay.innerHTML=''; livesDisplay.style.display='flex';
    const ml=3-misses;
    for(let i=0;i<3;i++){
      const p=document.createElement('div');p.className='life-pip'+(i>=ml?' lost':'');
      if(i<ml){p.style.background='var(--yellow)';p.style.boxShadow='0 0 8px var(--yellow)';}
      livesDisplay.appendChild(p);
    }
  }else livesDisplay.style.display='none';

  document.getElementById('xpBarFill').style.width=(PD.xp/xpFor(PD.level)*100)+'%';
  document.getElementById('levelDisplay').textContent=`LVL ${PD.level}`;
}

// ========== WAVES ==========
function showWave(){
  waveNum.textContent=wave; waveBanner.classList.remove('show');
  void waveBanner.offsetWidth; waveBanner.classList.add('show');
}
function getSpawnRate(){return Math.max(250,(gameMode==='zen'?1100:900)-wave*70);}

// ========== GAME LOOP ==========
function startGame(mode){
  initAudio(); gameMode=mode;
  score=0;combo=0;maxCombo=0;hits=0;misses=0;clicks=0;
  timeLeft=30;wave=1;lives=5;bossesKilled=0;totalHitsInWave=0;
  gameActive=true;gameSpeed=1;activePowerups={};targets=[];spawnAccum=0;

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  hud.style.display='flex'; crosshair.style.display='block';
  gameLayer.innerHTML=''; modeDisplay.textContent=mode.toUpperCase();
  updateHUD(); showWave(); startMusic();

  lastFrame=performance.now(); requestAnimationFrame(gameLoop);

  gameLayer.onpointerdown=(e)=>{
    if(e.target===gameLayer){
      clicks++; combo=0;
      if(gameMode==='precision'){misses++;if(misses>=3){endGame();return;}}
      updateHUD(); playMiss(); shakeScreen(2);
      crosshair.classList.add('firing'); setTimeout(()=>crosshair.classList.remove('firing'),80);
    }
  };
}

function gameLoop(now){
  if(!gameActive)return;
  const rawDt=(now-lastFrame)/1000; lastFrame=now;
  const dt=rawDt*gameSpeed;

  if(gameMode==='blitz'){
    timeLeft-=dt;
    if(timeLeft<=0){timeLeft=0;endGame();return;}
    const nw=Math.floor((30-timeLeft)/8)+1;
    if(nw>wave&&nw<=4){wave=nw;showWave();}
  }else{
    const hpw=15+wave*5;
    if(totalHitsInWave>=hpw){
      wave++; totalHitsInWave=0; showWave();
      if(gameMode==='survival'&&wave%3===0)setTimeout(()=>spawnBoss(),500);
    }
  }

  spawnAccum+=dt*1000;
  const rate=getSpawnRate();
  while(spawnAccum>=rate){spawnAccum-=rate;spawnTarget();}

  // Move
  targets.forEach(t=>{
    if(!t.alive||!t.mv)return;
    const m=t.mv, el=(now-t.spawn)/1000;
    let nx=m.ox, ny=m.oy;
    if(m.pattern==='linear'){nx+=Math.cos(m.angle)*m.speed*el*60;ny+=Math.sin(m.angle)*m.speed*el*60;}
    else if(m.pattern==='sine'){nx+=Math.cos(m.angle)*m.speed*el*40;ny+=Math.sin(el*3+m.phase)*m.radius;}
    else if(m.pattern==='circle'){nx+=Math.cos(el*2+m.phase)*m.radius;ny+=Math.sin(el*2+m.phase)*m.radius;}
    nx=Math.max(t.hs,Math.min(innerWidth-t.hs,nx));
    ny=Math.max(t.hs+60,Math.min(innerHeight-t.hs,ny));
    t.x=nx;t.y=ny;
    t.el.style.left=(nx-t.hs)+'px'; t.el.style.top=(ny-t.hs)+'px';
  });

  // Shake
  if(screenShake.intensity>0){
    screenShake.x=(Math.random()-0.5)*screenShake.intensity*2;
    screenShake.y=(Math.random()-0.5)*screenShake.intensity*2;
    gameLayer.style.transform=`translate(${screenShake.x}px,${screenShake.y}px)`;
    screenShake.intensity*=0.88;
    if(screenShake.intensity<0.3){screenShake.intensity=0;gameLayer.style.transform='';}
  }

  updateHUD(); requestAnimationFrame(gameLoop);
}

function endGame(){
  gameActive=false; stopMusic();
  hud.style.display='none'; crosshair.style.display='none';
  gameLayer.innerHTML=''; gameLayer.style.transform='';
  slowmoVignette.classList.remove('active'); gameSpeed=1;

  const xpG=Math.round(score*0.1+hits*2+maxCombo*3+bossesKilled*20);
  PD.xp+=xpG; PD.totalHits+=hits; PD.totalGames++;
  while(PD.xp>=xpFor(PD.level)){PD.xp-=xpFor(PD.level);PD.level++;}

  const isNew=score>(PD.highscores[gameMode]||0);
  if(isNew)PD.highscores[gameMode]=score;
  saveD();

  const et=document.getElementById('endTitle');
  if(gameMode==='survival'&&wave>=10){et.textContent='LEGENDARY';et.className='end-title victory';}
  else{et.textContent='TERMINATED';et.className='end-title defeat';}

  document.getElementById('finalScore').textContent=score.toLocaleString();
  document.getElementById('finalCombo').textContent=maxCombo+'x';
  document.getElementById('finalHits').textContent=hits;
  const acc=clicks>0?Math.round((hits/clicks)*100):0;
  document.getElementById('finalAccuracy').textContent=acc+'%';
  document.getElementById('finalWave').textContent=wave;
  document.getElementById('finalBosses').textContent=bossesKilled;
  document.getElementById('xpGain').textContent=`+${xpG} XP`;

  const hsE=document.getElementById('highscoreEnd');
  hsE.textContent=isNew?`NEW HIGHSCORE: ${score.toLocaleString()}`:`BEST: ${(PD.highscores[gameMode]||0).toLocaleString()}`;
  document.getElementById('endScreen').classList.remove('hidden');

  if(score>=1000)checkAch('score1k','FOUR DIGITS','Scored 1,000+');
  if(score>=5000)checkAch('score5k','NEON WARRIOR','Scored 5,000+');
  if(score>=10000)checkAch('score10k','CYBER LEGEND','Scored 10,000+');
  if(acc>=90&&clicks>=20)checkAch('sharpshooter','SHARPSHOOTER','90%+ accuracy');
  if(acc===100&&clicks>=15)checkAch('perfect','PERFECT','100% accuracy');
  if(PD.totalGames>=10)checkAch('dedicated','DEDICATED','Played 10 games');
  if(PD.level>=10)checkAch('veteran','VETERAN','Reached Level 10');
  if(wave>=10)checkAch('wave10','WAVE SURFER','Reached Wave 10');
}

// ========== MENU ==========
function updateMenu(){
  const hs=PD.highscores; let t='';
  if(hs.blitz>0)t+=`BLITZ: ${hs.blitz.toLocaleString()}  `;
  if(hs.survival>0)t+=`SURVIVAL: ${hs.survival.toLocaleString()}  `;
  if(hs.zen>0)t+=`ZEN: ${hs.zen.toLocaleString()}  `;
  if(hs.precision>0)t+=`PRECISION: ${hs.precision.toLocaleString()}`;
  document.getElementById('highscoreStart').textContent=t;
  document.getElementById('menuLevel').textContent=`LEVEL ${PD.level}`;
  document.getElementById('menuXpFill').style.width=(PD.xp/xpFor(PD.level)*100)+'%';
}
updateMenu();

document.querySelectorAll('.mode-card').forEach(c=>c.addEventListener('click',()=>startGame(c.dataset.mode)));
document.getElementById('restartBtn').addEventListener('click',()=>startGame(gameMode));
document.getElementById('menuBtn').addEventListener('click',()=>{
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  updateMenu();
});
document.getElementById('soundToggle').addEventListener('click',()=>{
  soundEnabled=!soundEnabled;
  document.getElementById('soundToggle').textContent=soundEnabled?'🔊':'🔇';
  if(!soundEnabled)stopMusic(); else if(gameActive)startMusic();
});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&!gameActive){e.preventDefault();
    if(!document.getElementById('startScreen').classList.contains('hidden'))startGame('blitz');
    else startGame(gameMode);
  }
  if(e.code==='Escape'&&gameActive)endGame();
  if(e.code==='KeyM'){soundEnabled=!soundEnabled;
    document.getElementById('soundToggle').textContent=soundEnabled?'🔊':'🔇';
    if(!soundEnabled)stopMusic();else if(gameActive)startMusic();
  }
});
</script>
</body>
