<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>MARS RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--org:#ff7722;--red:#ff2020;--grn:#44ee44;--yel:#ffcc33;--blu:#44aaff;--bg:#0a0504}
body{background:var(--bg);overflow:hidden;font-family:'Orbitron',monospace;color:#fff;height:100vh;width:100vw;
  user-select:none;-webkit-user-select:none;touch-action:none}
canvas#gc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;touch-action:none}

.visor{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;
  border:clamp(8px,2vw,20px) solid rgba(15,10,8,.7);border-radius:clamp(15px,4vw,50px);
  box-shadow:inset 0 0 50px rgba(0,0,0,.4),inset 0 0 120px rgba(120,50,10,.05)}

.hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;
  padding:max(12px,2vw) max(16px,2.5vw);pointer-events:none}
.h-score{font-size:clamp(20px,5vw,36px);font-weight:900;color:var(--org);
  text-shadow:0 0 15px var(--org),0 0 30px var(--org);letter-spacing:2px}
.h-dist{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,14px);color:rgba(255,200,150,.5);letter-spacing:2px;margin-top:2px}
.h-lives{display:flex;gap:clamp(4px,1vw,8px)}
.lp{width:clamp(14px,3vw,22px);height:clamp(14px,3vw,22px);border-radius:50%;
  background:var(--grn);box-shadow:0 0 8px var(--grn);transition:.3s}
.lp.lost{background:rgba(255,32,64,.3);box-shadow:none}
.h-multi{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,2.5vw,16px);
  color:var(--yel);text-shadow:0 0 8px var(--yel);margin-top:4px}

.dmg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:55;pointer-events:none;
  background:radial-gradient(ellipse,transparent 40%,rgba(255,0,0,.35));opacity:0;transition:opacity .15s}
.dmg.show{opacity:1}

.banner{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:60;
  font-size:clamp(32px,8vw,80px);font-weight:900;letter-spacing:4px;pointer-events:none;opacity:0;white-space:nowrap}
.banner.show{animation:banB .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes banB{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);opacity:0}
  30%{transform:translate(-50%,-50%) scale(1.15) rotate(2deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.85);opacity:0}}

/* Controls hint */
.ctrl{position:fixed;bottom:max(16px,3vw);left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,13px);color:rgba(255,200,150,.3);
  letter-spacing:2px;text-align:center}

/* Screens */
.scr{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(10,5,4,.96);backdrop-filter:blur(20px);padding:20px;overflow-y:auto}
.scr.hidden{display:none}
.title{font-size:clamp(36px,10vw,90px);font-weight:900;letter-spacing:clamp(3px,1vw,8px);
  background:linear-gradient(135deg,var(--org),var(--red),var(--yel));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 25px rgba(255,100,30,.6));animation:tG 3s ease-in-out infinite}
@keyframes tG{0%,100%{filter:drop-shadow(0 0 25px rgba(255,100,30,.6))}50%{filter:drop-shadow(0 0 25px rgba(255,32,64,.6))}}
.sub{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,16px);color:rgba(255,180,120,.4);margin-top:8px;letter-spacing:4px}
.btn{padding:clamp(12px,2.5vw,18px) clamp(32px,8vw,60px);font-family:'Orbitron',monospace;font-size:clamp(14px,3vw,20px);
  font-weight:700;letter-spacing:3px;color:#fff;background:linear-gradient(135deg,var(--org),var(--red));border:none;cursor:pointer;
  clip-path:polygon(5% 0%,100% 0%,95% 100%,0% 100%);transition:.2s;text-transform:uppercase;margin-top:28px;
  box-shadow:0 0 25px rgba(255,100,30,.3)}
.btn:hover,.btn:active{transform:scale(1.05);box-shadow:0 0 40px rgba(255,100,30,.5)}
.btn.sec{background:transparent;color:var(--org);border:1px solid var(--org);clip-path:none;
  font-size:clamp(9px,2vw,12px);padding:10px 28px;margin-top:10px;box-shadow:none}
.hs{margin-top:16px;font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,13px);
  color:var(--yel);text-shadow:0 0 8px var(--yel);letter-spacing:2px}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,14px);margin-top:20px;width:min(400px,90vw)}
.sc{background:rgba(255,100,30,.03);border:1px solid rgba(255,100,30,.1);padding:clamp(10px,2vw,14px);text-align:center;border-radius:4px}
.sc .sl{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.3vw,9px);color:rgba(255,200,150,.4);letter-spacing:2px;text-transform:uppercase}
.sc .sv{font-size:clamp(16px,4vw,24px);font-weight:900;margin-top:4px;color:var(--org);text-shadow:0 0 10px var(--org)}
.sc .sv.grn{color:var(--grn);text-shadow:0 0 10px var(--grn)}
.sc .sv.yel{color:var(--yel);text-shadow:0 0 10px var(--yel)}

.snd{position:fixed;top:8px;right:10px;z-index:110;font-size:clamp(14px,3.5vw,20px);
  background:none;border:none;cursor:pointer;opacity:.35;padding:6px}
.snd:hover,.snd:active{opacity:.7}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div class="visor"></div>
<div class="dmg" id="dmg"></div>
<div class="banner" id="banner"></div>

<div class="hud" id="hud" style="display:none">
  <div>
    <div class="h-score" id="hScore">0</div>
    <div class="h-dist" id="hDist">0m</div>
  </div>
  <div style="text-align:right">
    <div class="h-lives" id="hLives"></div>
    <div class="h-multi" id="hMulti"></div>
  </div>
</div>

<div class="ctrl" id="ctrl">← A/D → &nbsp; SPACE = JUMP &nbsp; // &nbsp; SWIPE or TAP</div>

<button class="snd" id="sndBtn">🔊</button>

<div class="scr" id="startScr">
  <div class="title">MARS RUNNER</div>
  <div class="sub">dodge // collect // survive</div>
  <button class="btn" id="startBtn">RUN</button>
  <div class="hs" id="hsStart"></div>
</div>

<div class="scr hidden" id="endScr">
  <div class="title" style="font-size:clamp(28px,7vw,60px)">CRASHED</div>
  <div class="sg">
    <div class="sc"><div class="sl">Score</div><div class="sv" id="fScore">0</div></div>
    <div class="sc"><div class="sl">Distance</div><div class="sv grn" id="fDist">0m</div></div>
    <div class="sc"><div class="sl">Collected</div><div class="sv yel" id="fColl">0</div></div>
  </div>
  <div class="hs" id="hsEnd"></div>
  <button class="btn" id="rBtn">RETRY</button>
  <button class="btn sec" id="mBtn">MENU</button>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.162.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from'three';

// ========== RENDERER ==========
const canvas=document.getElementById('gc');
const R=new THREE.WebGLRenderer({canvas,antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.setClearColor(0x1a0a04);
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x6b3018,30,120);

const cam=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,200);
cam.position.set(0,4,8);
cam.lookAt(0,1.5,-10);

// ========== LIGHTS ==========
scene.add(new THREE.AmbientLight(0x8b4422,1));
const sun=new THREE.DirectionalLight(0xffcc88,1.6);
sun.position.set(30,50,20);scene.add(sun);
scene.add(new THREE.HemisphereLight(0xdd8844,0x441100,.5));

// ========== SKY ==========
const skyGeo=new THREE.SphereGeometry(150,24,24);
const skyC=document.createElement('canvas');skyC.width=1024;skyC.height=512;
const sx=skyC.getContext('2d');
const sg=sx.createLinearGradient(0,0,0,512);
sg.addColorStop(0,'#080308');sg.addColorStop(.35,'#1a0808');sg.addColorStop(.55,'#4a1808');
sg.addColorStop(.7,'#8a3818');sg.addColorStop(.8,'#bb5528');sg.addColorStop(.9,'#cc7038');sg.addColorStop(1,'#8b4020');
sx.fillStyle=sg;sx.fillRect(0,0,1024,512);
for(let i=0;i<300;i++){const x=Math.random()*1024,y=Math.random()*300;
  sx.beginPath();sx.arc(x,y,Math.random()<.8?.3:.6,0,Math.PI*2);
  const b=130+Math.floor(Math.random()*60);
  sx.fillStyle=`rgba(${b},${b},${b},${.1+Math.random()*.2})`;sx.fill();}
scene.add(new THREE.Mesh(skyGeo,new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(skyC),side:THREE.BackSide})));

// ========== GROUND ==========
const gndGeo=new THREE.PlaneGeometry(20,300,10,60);
const gndPA=gndGeo.attributes.position;
for(let i=0;i<gndPA.count;i++){
  gndPA.setZ(i,(Math.random()-.5)*.3);
}
gndGeo.computeVertexNormals();
const gndCA=new Float32Array(gndPA.count*3);
for(let i=0;i<gndPA.count;i++){
  const v=.3+Math.random()*.12;
  gndCA[i*3]=v;gndCA[i*3+1]=v*.38;gndCA[i*3+2]=v*.15;
}
gndGeo.setAttribute('color',new THREE.BufferAttribute(gndCA,3));
const gnd=new THREE.Mesh(gndGeo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:.92,flatShading:true}));
gnd.rotation.x=-Math.PI/2;gnd.position.z=-140;
scene.add(gnd);
// Second ground tile
const gnd2=gnd.clone();gnd2.position.z=-440;scene.add(gnd2);

// ========== LANE LINES ==========
const LANES=[-3,0,3];
for(let x of[-4.5,-1.5,1.5,4.5]){
  const lg=new THREE.PlaneGeometry(.06,300);
  const lm=new THREE.MeshBasicMaterial({color:0x553315,transparent:true,opacity:.15});
  const line=new THREE.Mesh(lg,lm);
  line.rotation.x=-Math.PI/2;line.position.set(x,.01,-140);scene.add(line);
  const l2=line.clone();l2.position.z=-440;scene.add(l2);
}

// ========== SIDE ROCKS ==========
const rockGeo=new THREE.DodecahedronGeometry(1,0);
const sideRocks=[];
for(let i=0;i<40;i++){
  const s=.5+Math.random()*2;
  const side=i%2===0?-1:1;
  const m=new THREE.Mesh(rockGeo,new THREE.MeshStandardMaterial({
    color:0x6b3015+Math.floor(Math.random()*0x200800),roughness:.92,flatShading:true}));
  m.position.set(side*(7+Math.random()*5),s*.3,-i*8);
  m.scale.setScalar(s);m.rotation.set(Math.random()*3,Math.random()*3,0);
  scene.add(m);sideRocks.push(m);
}

// Mountains
for(let i=0;i<8;i++){
  const h=8+Math.random()*15;
  const mg=new THREE.ConeGeometry(8+Math.random()*10,h,4+Math.floor(Math.random()*3));
  const mm=new THREE.Mesh(mg,new THREE.MeshStandardMaterial({color:0x5a2510,roughness:.95,flatShading:true}));
  const side=i%2===0?-1:1;
  mm.position.set(side*(35+Math.random()*20),h/2-2,-30-i*40);
  scene.add(mm);
}

// ========== DUST ==========
const dustN=150;
const dustG=new THREE.BufferGeometry();
const dustP=new Float32Array(dustN*3);
for(let i=0;i<dustN;i++){dustP[i*3]=(Math.random()-.5)*20;dustP[i*3+1]=Math.random()*6+.5;dustP[i*3+2]=-Math.random()*60;}
dustG.setAttribute('position',new THREE.BufferAttribute(dustP,3));
const dust=new THREE.Points(dustG,new THREE.PointsMaterial({size:.08,color:0xbb6633,transparent:true,opacity:.2,sizeAttenuation:true}));
scene.add(dust);

// ========== GAME STATE ==========
let score=0,dist=0,lives=3,collected=0,gameActive=false,speed=12,lane=1,targetLane=1;
let playerY=0,velY=0,isJumping=false,multiTimer=0,multi=1;
let orbs=[],lastFrame=0,spawnDist=0;
let soundEnabled=true,audioCtx;
let highscore=parseInt(localStorage.getItem('marsRunHS')||'0');

// ========== PLAYER ==========
const playerMat=new THREE.MeshPhysicalMaterial({color:0xff8833,emissive:0x441100,emissiveIntensity:.5,
  metalness:.3,roughness:.4,clearcoat:.6});
const playerGeo=new THREE.SphereGeometry(.5,16,16);
const player=new THREE.Mesh(playerGeo,playerMat);
player.position.set(0,.8,0);
player.add(new THREE.PointLight(0xff8833,.8,5));
// Visor
const visorG=new THREE.SphereGeometry(.35,12,12,0,Math.PI*2,0,Math.PI/2);
const visorM=new THREE.MeshPhysicalMaterial({color:0x88ccff,emissive:0x224466,metalness:.8,roughness:.1,clearcoat:1,transparent:true,opacity:.4});
const visor=new THREE.Mesh(visorG,visorM);visor.position.y=.15;visor.rotation.x=-.3;
player.add(visor);
scene.add(player);

// ========== ORB TYPES ==========
const ORB={
  green: {color:0x44ee44,emissive:0x004400,pts:10,r:.4,action:'score'},
  yellow:{color:0xffcc33,emissive:0x443300,pts:25,r:.45,action:'score'},
  blue:  {color:0x44aaff,emissive:0x001144,pts:50,r:.5,action:'multi'},
  red:   {color:0xff2020,emissive:0x440000,pts:0,r:.55,action:'damage'},
  purple:{color:0xcc44ff,emissive:0x220044,pts:100,r:.35,action:'score'},
};

const orbGeo=new THREE.SphereGeometry(1,16,16);

function spawnOrb(type,laneIdx,z,yOff=0){
  const cfg=ORB[type];
  const mat=new THREE.MeshPhysicalMaterial({
    color:cfg.color,emissive:cfg.emissive,emissiveIntensity:.8,
    metalness:.15,roughness:.2,clearcoat:.8,transparent:true,opacity:.85
  });
  const m=new THREE.Mesh(orbGeo,mat);
  const x=LANES[laneIdx];
  m.position.set(x,.6+cfg.r+yOff,z);
  m.scale.setScalar(cfg.r);

  // Glow
  const gm=new THREE.MeshBasicMaterial({color:cfg.color,transparent:true,opacity:.12});
  const glow=new THREE.Mesh(orbGeo,gm);glow.scale.setScalar(1.5);m.add(glow);

  // Spikes for red (danger)
  if(type==='red'){
    for(let i=0;i<8;i++){
      const sg=new THREE.ConeGeometry(.15,.5,4);
      const sm=new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:.6});
      const spike=new THREE.Mesh(sg,sm);
      const a=i/8*Math.PI*2,p=Math.random()*Math.PI;
      spike.position.set(Math.sin(p)*Math.cos(a)*1.2,Math.sin(p)*Math.sin(a)*1.2,Math.cos(p)*1.2);
      spike.lookAt(0,0,0);m.add(spike);
    }
  }

  if(type!=='red'){m.add(new THREE.PointLight(cfg.color,.4,4));}

  scene.add(m);
  orbs.push({mesh:m,type,cfg,lane:laneIdx,alive:true,yBase:.6+cfg.r+yOff,wobble:Math.random()*10});
}

function spawnRow(z){
  // Pick pattern
  const r=Math.random();
  const diff=Math.min(1,dist/500); // 0-1 difficulty

  if(r<.3){
    // Single collectible
    const l=Math.floor(Math.random()*3);
    const t=Math.random()<.15?'purple':Math.random()<.3?'blue':Math.random()<.5?'yellow':'green';
    const y=Math.random()<.3+diff*.2?1.5:0; // some floating
    spawnOrb(t,l,z,y);
  }else if(r<.55){
    // Red obstacle + collectible
    const rl=Math.floor(Math.random()*3);
    spawnOrb('red',rl,z);
    const cl=(rl+1+Math.floor(Math.random()*2))%3;
    const t=Math.random()<.2?'blue':Math.random()<.4?'yellow':'green';
    spawnOrb(t,cl,z,Math.random()<.4?1.5:0);
  }else if(r<.7){
    // Two reds, one safe lane
    const safe=Math.floor(Math.random()*3);
    for(let i=0;i<3;i++){
      if(i===safe){
        const t=Math.random()<.15?'purple':'green';
        spawnOrb(t,i,z,Math.random()<.3?1.5:0);
      }else{
        spawnOrb('red',i,z);
      }
    }
  }else if(r<.85){
    // Line of collectibles
    const l=Math.floor(Math.random()*3);
    const t=Math.random()<.3?'yellow':'green';
    for(let j=0;j<3;j++) spawnOrb(t,l,z-j*3);
  }else{
    // Floating row
    const t=Math.random()<.3?'blue':'yellow';
    for(let i=0;i<3;i++) spawnOrb(t,i,z,1.8);
    // Red below
    if(diff>.3) spawnOrb('red',Math.floor(Math.random()*3),z);
  }
}

// ========== SPLAT ==========
let splats=[];
const splatGeo=new THREE.SphereGeometry(.08,4,4);
function splat(pos,color,n=12){
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(splatGeo,new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
    m.position.copy(pos);m.scale.setScalar(.5+Math.random());
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    scene.add(m);
    splats.push({mesh:m,vx:Math.cos(a)*s,vy:1+Math.random()*3,vz:Math.sin(a)*s*.3-2,life:1});
  }
}

// ========== AUDIO ==========
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function snd(type,f,d,v=.1){
  if(!audioCtx||!soundEnabled)return;
  const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=type;
  o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*(type==='sawtooth'?.3:2),t+d);
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.start();o.stop(t+d);
}
function playCollect(){snd('sine',800,.08,.08);snd('sine',1200,.06,.04);}
function playHit(){snd('sawtooth',150,.25,.1);}
function playJump(){snd('sine',400,.1,.06);snd('sine',600,.08,.03);}

// ========== HUD ==========
function updateHUD(){
  document.getElementById('hScore').textContent=score.toLocaleString();
  document.getElementById('hDist').textContent=Math.floor(dist)+'m';
  const hl=document.getElementById('hLives');hl.innerHTML='';
  for(let i=0;i<3;i++){const p=document.createElement('div');p.className='lp'+(i>=lives?' lost':'');hl.appendChild(p);}
  document.getElementById('hMulti').textContent=multi>1?`×${multi} MULTI`:'';
}

function showBanner(text,color){
  const b=document.getElementById('banner');b.textContent=text;b.style.color=color;
  b.style.textShadow=`0 0 30px ${color},0 0 60px ${color}`;
  b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
}

function showDmg(){const d=document.getElementById('dmg');d.classList.add('show');setTimeout(()=>d.classList.remove('show'),200);}

// ========== INPUT ==========
let touchStartX=0,touchStartY=0;

function moveLeft(){if(targetLane>0)targetLane--;snd('sine',500,.04,.03);}
function moveRight(){if(targetLane<2)targetLane++;snd('sine',500,.04,.03);}
function jump(){if(!isJumping){isJumping=true;velY=9;playJump();}}

document.addEventListener('keydown',e=>{
  if(!gameActive){if(e.code==='Space'){e.preventDefault();startGame();}return;}
  if(e.code==='ArrowLeft'||e.code==='KeyA')moveLeft();
  if(e.code==='ArrowRight'||e.code==='KeyD')moveRight();
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();jump();}
});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!gameActive){startGame();return;}
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  if(Math.abs(dx)>30&&Math.abs(dx)>Math.abs(dy)){
    if(dx<0)moveLeft();else moveRight();
  }else if(dy<-30){
    jump();
  }else{
    // Tap - jump
    jump();
  }
},{passive:false});

canvas.addEventListener('click',e=>{
  if(!gameActive)return;
  // Click left/right side to move, center to jump
  const x=e.clientX/innerWidth;
  if(x<.33)moveLeft();
  else if(x>.67)moveRight();
  else jump();
});

// ========== GAME ==========
function startGame(){
  initAudio();
  score=0;dist=0;lives=3;collected=0;speed=12;lane=1;targetLane=1;
  playerY=0;velY=0;isJumping=false;multi=1;multiTimer=0;spawnDist=0;
  gameActive=true;

  orbs.forEach(o=>scene.remove(o.mesh));orbs=[];
  splats.forEach(s=>scene.remove(s.mesh));splats=[];
  player.position.set(0,.8,0);

  document.getElementById('startScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  document.getElementById('ctrl').style.display='';
  updateHUD();
  lastFrame=performance.now();
}

function endGame(){
  if(!gameActive)return;
  gameActive=false;
  const isNew=score>highscore;
  if(isNew){highscore=score;localStorage.setItem('marsRunHS',highscore);}

  document.getElementById('hud').style.display='none';
  document.getElementById('ctrl').style.display='none';
  document.getElementById('fScore').textContent=score.toLocaleString();
  document.getElementById('fDist').textContent=Math.floor(dist)+'m';
  document.getElementById('fColl').textContent=collected;
  document.getElementById('hsEnd').textContent=isNew?`NEW RECORD: ${score.toLocaleString()}`:`BEST: ${highscore.toLocaleString()}`;
  document.getElementById('endScr').classList.remove('hidden');
}

// ========== GAME LOOP ==========
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min((now-lastFrame)/1000,.05);
  lastFrame=now;

  if(!gameActive){R.render(scene,cam);return;}

  // Speed increases over time
  speed=12+dist*.008;
  dist+=speed*dt;

  // Multi timer
  if(multi>1){multiTimer-=dt;if(multiTimer<=0){multi=1;}}

  // Player lane movement (smooth)
  const targetX=LANES[targetLane];
  player.position.x+=(targetX-player.position.x)*dt*12;
  lane=targetLane;

  // Jump physics
  velY-=25*dt; // gravity
  playerY+=velY*dt;
  if(playerY<=0){playerY=0;velY=0;isJumping=false;}
  player.position.y=.8+playerY;

  // Player rotation (visual only)
  player.rotation.z=(targetX-player.position.x)*-.5;
  if(isJumping)player.rotation.x-=dt*4;
  else player.rotation.x+=(0-player.rotation.x)*dt*5;

  // Scroll ground
  gnd.position.z+=speed*dt;gnd2.position.z+=speed*dt;
  if(gnd.position.z>10){gnd.position.z-=600;}
  if(gnd2.position.z>10){gnd2.position.z-=600;}

  // Scroll side rocks
  sideRocks.forEach(r=>{r.position.z+=speed*dt;if(r.position.z>15)r.position.z-=320;});

  // Dust
  dust.position.z+=speed*dt;
  if(dust.position.z>10)dust.position.z-=60;

  // Spawn orbs
  spawnDist+=speed*dt;
  const spawnInterval=Math.max(6,14-dist*.005);
  if(spawnDist>=spawnInterval){
    spawnDist=0;
    spawnRow(-50-Math.random()*10);
  }

  // Update orbs
  const t=now*.001;
  for(let i=orbs.length-1;i>=0;i--){
    const o=orbs[i];
    if(!o.alive){orbs.splice(i,1);continue;}

    o.mesh.position.z+=speed*dt;
    // Wobble
    o.mesh.position.y=o.yBase+Math.sin(t*3+o.wobble)*.15;
    o.mesh.rotation.y+=dt*2;
    o.mesh.rotation.x+=dt;

    // Collision with player
    const dx=player.position.x-o.mesh.position.x;
    const dy=player.position.y-o.mesh.position.y;
    const dz=o.mesh.position.z;
    const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
    const hitR=o.cfg.r+.6;

    if(d<hitR&&Math.abs(dz)<1.5){
      o.alive=false;
      const pos=o.mesh.position.clone();

      if(o.cfg.action==='damage'){
        // Hit red orb!
        lives--;
        playHit();showDmg();
        splat(pos,0xff2020,15);
        multi=1;
        showBanner('DAMAGE!','#ff2020');
        if(lives<=0){splat(pos,0xff2020,25);setTimeout(endGame,300);}
      }else{
        // Collect!
        collected++;
        const pts=o.cfg.pts*multi;
        score+=pts;
        playCollect();
        splat(pos,o.cfg.color,8);

        if(o.cfg.action==='multi'){
          multi=Math.min(multi+1,5);
          multiTimer=8;
          showBanner(`×${multi} MULTI!`,'#44aaff');
        }

        // Milestone banners
        if(collected===25)showBanner('NICE!','#44ee44');
        if(collected===50)showBanner('AMAZING!','#ffcc33');
        if(collected===100)showBanner('LEGENDARY!','#cc44ff');
      }
      scene.remove(o.mesh);
      o.mesh.traverse(c=>{if(c.material)c.material.dispose();});
      updateHUD();
    }

    // Remove if passed player
    if(o.mesh.position.z>15&&o.alive){
      o.alive=false;scene.remove(o.mesh);
      o.mesh.traverse(c=>{if(c.material)c.material.dispose();});
    }
  }

  // Update splats
  for(let i=splats.length-1;i>=0;i--){
    const s=splats[i];
    s.mesh.position.x+=s.vx*dt;
    s.mesh.position.y+=s.vy*dt;
    s.mesh.position.z+=s.vz*dt;
    s.vy-=12*dt;s.life-=dt*2;
    s.mesh.material.opacity=Math.max(0,s.life);
    if(s.life<=0){scene.remove(s.mesh);s.mesh.material.dispose();splats.splice(i,1);}
  }

  // Camera follows player smoothly
  cam.position.x+=(player.position.x*.3-cam.position.x)*dt*4;
  cam.position.y+=(4+playerY*.3-cam.position.y)*dt*3;

  // Score from distance
  score=Math.max(score,Math.floor(dist*.5));

  updateHUD();
  R.render(scene,cam);
}

// ========== INIT ==========
const hsS=document.getElementById('hsStart');
if(highscore>0)hsS.textContent=`BEST: ${highscore.toLocaleString()}`;
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('rBtn').addEventListener('click',startGame);
document.getElementById('mBtn').addEventListener('click',()=>{
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('startScr').classList.remove('hidden');
  if(highscore>0)hsS.textContent=`BEST: ${highscore.toLocaleString()}`;
});
document.getElementById('sndBtn').addEventListener('click',()=>{
  soundEnabled=!soundEnabled;
  document.getElementById('sndBtn').textContent=soundEnabled?'🔊':'🔇';
});

window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});

lastFrame=performance.now();loop();
</script>
