<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>MARS HUNTER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0504;overflow:hidden;font-family:'Orbitron',monospace;color:#fff;height:100vh;width:100vw;
  user-select:none;-webkit-user-select:none;touch-action:none;cursor:none}
canvas#gc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* Visor */
.visor{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3;pointer-events:none;
  border:clamp(8px,2vw,20px) solid rgba(15,10,5,.75);border-radius:clamp(15px,4vw,50px);
  box-shadow:inset 0 0 50px rgba(0,0,0,.4),inset 0 0 120px rgba(100,40,10,.05)}

/* Scope */
.scope{position:fixed;z-index:99;pointer-events:none;width:clamp(40px,8vw,60px);height:clamp(40px,8vw,60px);
  transform:translate(-50%,-50%);transition:transform .05s}
.scope::before,.scope::after{content:'';position:absolute;background:rgba(255,100,30,.6);box-shadow:0 0 4px rgba(255,80,20,.4)}
.scope::before{width:1.5px;height:100%;left:50%;transform:translateX(-50%)}
.scope::after{height:1.5px;width:100%;top:50%}
.scope .dot{position:absolute;width:4px;height:4px;background:#ff3300;border-radius:50%;top:50%;left:50%;
  transform:translate(-50%,-50%);box-shadow:0 0 6px #ff3300}
.scope .ring{position:absolute;top:4px;left:4px;right:4px;bottom:4px;border:1px solid rgba(255,80,30,.2);border-radius:50%}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;
  padding:max(10px,2vw) max(14px,2.5vw);pointer-events:none}
.h-score{font-size:clamp(18px,4.5vw,32px);font-weight:900;color:#ff9944;
  text-shadow:0 0 12px #ff9944;letter-spacing:2px}
.h-info{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,12px);color:rgba(255,200,150,.5);letter-spacing:2px;margin-top:2px}
.h-lives{display:flex;gap:clamp(3px,.8vw,6px);margin-top:4px}
.lp{width:clamp(10px,2.5vw,16px);height:clamp(10px,2.5vw,16px);border-radius:50%;
  background:#44cc44;box-shadow:0 0 6px #44cc44;transition:.3s}
.lp.x{background:rgba(255,30,30,.3);box-shadow:none}
.h-kills{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,12px);color:#ffcc44;text-shadow:0 0 6px #ffcc44;margin-top:3px}

/* Damage */
.dmg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:55;pointer-events:none;
  background:radial-gradient(ellipse,transparent 40%,rgba(255,0,0,.35));opacity:0;transition:opacity .15s}
.dmg.show{opacity:1}

/* Banner */
.ban{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:60;
  font-size:clamp(28px,7vw,70px);font-weight:900;letter-spacing:4px;pointer-events:none;opacity:0;white-space:nowrap}
.ban.show{animation:bb .7s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes bb{0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  30%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.85);opacity:0}}

/* Wave */
.wave{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);z-index:70;text-align:center;pointer-events:none;opacity:0}
.wave.show{animation:wf 1.3s ease-out forwards}
.wave .wn{font-size:clamp(40px,10vw,90px);font-weight:900;color:#ff7722;text-shadow:0 0 25px #ff7722;line-height:1}
.wave .wl{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,14px);color:rgba(255,200,150,.5);letter-spacing:6px}
@keyframes wf{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}75%{opacity:1}100%{opacity:0}}

/* Screens */
.scr{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(10,5,4,.96);backdrop-filter:blur(15px);padding:20px;overflow-y:auto;cursor:default}
.scr.h{display:none}
.tt{font-size:clamp(32px,9vw,80px);font-weight:900;letter-spacing:clamp(3px,1vw,8px);
  background:linear-gradient(135deg,#ff7722,#ff2020,#ffcc44);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,100,30,.5))}
.st{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,15px);color:rgba(255,180,120,.4);margin-top:6px;letter-spacing:4px}
.btn{padding:clamp(12px,2.5vw,18px) clamp(32px,8vw,55px);font-family:'Orbitron',monospace;font-size:clamp(14px,3vw,20px);
  font-weight:700;letter-spacing:3px;color:#fff;background:linear-gradient(135deg,#ff7722,#ff2020);border:none;cursor:pointer;
  clip-path:polygon(5% 0%,100% 0%,95% 100%,0% 100%);transition:.2s;text-transform:uppercase;margin-top:24px}
.btn:hover,.btn:active{transform:scale(1.05);box-shadow:0 0 35px rgba(255,100,30,.5)}
.btn.s{background:transparent;color:#ff7722;border:1px solid #ff7722;clip-path:none;
  font-size:clamp(9px,1.8vw,11px);padding:8px 24px;margin-top:8px;box-shadow:none}
.hs{margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,12px);
  color:#ffcc44;text-shadow:0 0 6px #ffcc44;letter-spacing:2px}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,1.5vw,12px);margin-top:18px;width:min(380px,90vw)}
.sc{background:rgba(255,100,30,.03);border:1px solid rgba(255,100,30,.1);padding:clamp(8px,1.5vw,12px);text-align:center;border-radius:4px}
.sc .sl{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.2vw,8px);color:rgba(255,200,150,.4);letter-spacing:2px;text-transform:uppercase}
.sc .sv{font-size:clamp(14px,3.5vw,22px);font-weight:900;margin-top:3px;color:#ff9944;text-shadow:0 0 8px #ff9944}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div class="visor"></div>
<div class="dmg" id="dmg"></div>
<div class="scope" id="scope"><div class="dot"></div><div class="ring"></div></div>
<div class="ban" id="ban"></div>
<div class="wave" id="wav"><div class="wl">WAVE</div><div class="wn" id="wn">1</div></div>

<div class="hud" id="hud" style="display:none">
  <div>
    <div class="h-score" id="hs">0</div>
    <div class="h-info" id="hi">WAVE 1 · 0m</div>
  </div>
  <div style="text-align:right">
    <div class="h-lives" id="hl"></div>
    <div class="h-kills" id="hk">KILLS: 0</div>
  </div>
</div>

<div class="scr" id="ss">
  <div class="tt">MARS HUNTER</div>
  <div class="st">aim // shoot // survive</div>
  <div class="st" style="font-size:clamp(7px,1.3vw,10px);margin-top:4px;opacity:.4">A/D = DODGE · MOUSE/TAP = AIM & SHOOT</div>
  <button class="btn" id="go">DEPLOY</button>
  <div class="hs" id="hss"></div>
</div>

<div class="scr h" id="es">
  <div class="tt" style="font-size:clamp(26px,6vw,55px)">MISSION OVER</div>
  <div class="sg">
    <div class="sc"><div class="sl">Score</div><div class="sv" id="fs">0</div></div>
    <div class="sc"><div class="sl">Kills</div><div class="sv" id="fk">0</div></div>
    <div class="sc"><div class="sl">Distance</div><div class="sv" id="fd">0m</div></div>
  </div>
  <div class="hs" id="hse"></div>
  <button class="btn" id="re">RETRY</button>
  <button class="btn s" id="mn">MENU</button>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.162.0/build/three.module.js"}}</script>
<script type="module">
import*as THREE from'three';

const cv=document.getElementById('gc');
const R=new THREE.WebGLRenderer({canvas:cv,antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.setClearColor(0x1a0a04);
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.0;

const S=new THREE.Scene();
S.fog=new THREE.Fog(0x6b3018,50,160);

const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,200);
cam.position.set(0,2.5,0);

// Lights
S.add(new THREE.AmbientLight(0x8b4422,.9));
const sl=new THREE.DirectionalLight(0xffcc88,1.5);sl.position.set(30,50,20);S.add(sl);
S.add(new THREE.HemisphereLight(0xcc7744,0x331100,.4));

// Sky
const skyG=new THREE.SphereGeometry(120,16,16);
const skyCV=document.createElement('canvas');skyCV.width=512;skyCV.height=256;
const sx=skyCV.getContext('2d');
const sg=sx.createLinearGradient(0,0,0,256);
sg.addColorStop(0,'#0a0408');sg.addColorStop(.4,'#2a0f0a');sg.addColorStop(.65,'#8a3818');
sg.addColorStop(.8,'#bb5528');sg.addColorStop(1,'#8b4020');
sx.fillStyle=sg;sx.fillRect(0,0,512,256);
for(let i=0;i<200;i++){sx.beginPath();sx.arc(Math.random()*512,Math.random()*150,.3,0,Math.PI*2);
  sx.fillStyle=`rgba(180,180,180,${.1+Math.random()*.15})`;sx.fill();}
S.add(new THREE.Mesh(skyG,new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(skyCV),side:THREE.BackSide})));

// Ground - simple, scrolling
const gG=new THREE.PlaneGeometry(30,200,8,40);
const gP=gG.attributes.position;
for(let i=0;i<gP.count;i++)gP.setZ(i,(Math.random()-.5)*.2);
gG.computeVertexNormals();
const gC=new Float32Array(gP.count*3);
for(let i=0;i<gP.count;i++){const v=.28+Math.random()*.1;gC[i*3]=v;gC[i*3+1]=v*.38;gC[i*3+2]=v*.15;}
gG.setAttribute('color',new THREE.BufferAttribute(gC,3));
const gM=new THREE.MeshStandardMaterial({vertexColors:true,roughness:.92,flatShading:true});
const g1=new THREE.Mesh(gG,gM);g1.rotation.x=-Math.PI/2;g1.position.z=-90;S.add(g1);
const g2=g1.clone();g2.position.z=-290;S.add(g2);

// Side rocks (few)
const rkG=new THREE.DodecahedronGeometry(1,0);
const rks=[];
for(let i=0;i<12;i++){
  const s=.5+Math.random()*1.5,side=i%2?-1:1;
  const m=new THREE.Mesh(rkG,new THREE.MeshStandardMaterial({color:0x6b3015+Math.floor(Math.random()*0x200800),roughness:.92,flatShading:true}));
  m.position.set(side*(8+Math.random()*4),s*.3,-i*16);m.scale.setScalar(s);
  m.rotation.set(Math.random()*3,Math.random()*3,0);S.add(m);rks.push(m);
}

// Raycaster
const ray=new THREE.Raycaster();
const ptr=new THREE.Vector2();

// Orb geometry (shared)
const oG=new THREE.SphereGeometry(1,12,12);

// ========== STATE ==========
let score=0,kills=0,lives=5,wave=1,dist=0;
let gameActive=false,speed=8,spawnAcc=0;
let orbs=[],lasers=[],splats=[];
let sndOn=true,audioCtx,lastFrame=0;
let hi=parseInt(localStorage.getItem('mhHS')||'0');

// ========== AUDIO ==========
function initA(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function tone(t,f,d,v=.08){
  if(!audioCtx||!sndOn)return;
  const now=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=t;
  o.frequency.setValueAtTime(f,now);o.frequency.exponentialRampToValueAtTime(f*(t==='sawtooth'?.3:2),now+d);
  g.gain.setValueAtTime(v,now);g.gain.exponentialRampToValueAtTime(.001,now+d);
  o.start();o.stop(now+d);
}
function sfxShoot(){tone('sine',1800,.07,.08);tone('square',1200,.04,.04);}
function sfxHit(){tone('sine',900,.06,.06);tone('sine',1300,.04,.03);}
function sfxDmg(){tone('sawtooth',120,.25,.1);}

// ========== ORB TYPES ==========
const OT={
  alien:  {color:0x44ee44,em:0x003300,r:.7,pts:10,spd:1},
  fast:   {color:0xff44ff,em:0x330033,r:.5,pts:25,spd:2},
  tank:   {color:0xff4422,em:0x330000,r:1,pts:15,spd:.6,hp:3},
  gold:   {color:0xffcc22,em:0x332200,r:.6,pts:50,spd:1.2},
  blue:   {color:0x44aaff,em:0x001133,r:.55,pts:30,spd:1.5},
};

function spawnOrb(type,pos){
  if(!gameActive)return;
  const cfg=OT[type]||OT.alien;
  const mat=new THREE.MeshStandardMaterial({color:cfg.color,emissive:cfg.em,emissiveIntensity:.6,roughness:.25,metalness:.1});
  const m=new THREE.Mesh(oG,mat);
  if(!pos){
    const a=(Math.random()-.5)*12;
    const d=30+Math.random()*25;
    pos=new THREE.Vector3(a,1.5+Math.random()*2,cam.position.z-d);
  }
  m.position.copy(pos);m.scale.setScalar(cfg.r);
  // Eyes
  const eG=new THREE.SphereGeometry(.12,6,6);
  const eM=new THREE.MeshBasicMaterial({color:0xffffff});
  const e1=new THREE.Mesh(eG,eM);e1.position.set(-.25,.25,.85);m.add(e1);
  const e2=e1.clone();e2.position.x=.25;m.add(e2);
  S.add(m);
  orbs.push({mesh:m,type,cfg,alive:true,hp:cfg.hp||1,wobble:Math.random()*10,spawnT:performance.now()});
}

function spawnWave(){
  const n=3+wave*2;
  const types=['alien','alien','alien','fast','gold','blue'];
  if(wave>=3)types.push('tank','tank');
  if(wave>=5)types.push('fast','fast','tank');
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      if(!gameActive)return;
      const t=types[Math.floor(Math.random()*types.length)];
      spawnOrb(t);
    },i*400+Math.random()*300);
  }
}

// ========== LASER ==========
function fireLaser(from,to,color){
  const dir=new THREE.Vector3().subVectors(to,from);
  const len=dir.length();
  const bG=new THREE.CylinderGeometry(.015,.015,len,4);
  bG.rotateX(Math.PI/2);bG.translate(0,0,len/2);
  const beam=new THREE.Mesh(bG,new THREE.MeshBasicMaterial({color,transparent:true,opacity:.85}));
  beam.position.copy(from);beam.lookAt(to);S.add(beam);
  const iG=new THREE.SphereGeometry(.15,6,6);
  const imp=new THREE.Mesh(iG,new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
  imp.position.copy(to);S.add(imp);
  lasers.push({beam,imp,life:1});
}

// ========== SPLAT ==========
const spG=new THREE.SphereGeometry(.06,4,4);
function doSplat(pos,color,n=10){
  n=Math.min(n,12);
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(spG,new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
    m.position.copy(pos);m.scale.setScalar(.3+Math.random()*.7);
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3;
    S.add(m);
    splats.push({mesh:m,vx:Math.cos(a)*sp,vy:1+Math.random()*2.5,vz:Math.sin(a)*sp*.3,life:1});
  }
}

// ========== SHOOT ==========
function shoot(cx,cy){
  if(!gameActive)return;
  sfxShoot();
  // Scope pulse
  const sc=document.getElementById('scope');
  sc.style.transform='translate(-50%,-50%) scale(1.3)';
  setTimeout(()=>sc.style.transform='translate(-50%,-50%) scale(1)',50);

  ptr.x=(cx/innerWidth)*2-1;
  ptr.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(ptr,cam);

  const meshes=orbs.filter(o=>o.alive).map(o=>o.mesh);
  const hits=ray.intersectObjects(meshes,true);
  const gunPos=new THREE.Vector3(0,cam.position.y-.3,cam.position.z+.3);

  if(hits.length>0){
    let hm=hits[0].object;
    while(hm.parent&&hm.parent!==S)hm=hm.parent;
    const orb=orbs.find(o=>o.mesh===hm&&o.alive);
    if(orb){
      const p=orb.mesh.position.clone();
      fireLaser(gunPos,p,orb.cfg.color);
      orb.hp--;
      if(orb.hp<=0){
        orb.alive=false;
        score+=orb.cfg.pts;kills++;
        sfxHit();doSplat(p,orb.cfg.color,10);
        S.remove(orb.mesh);orb.mesh.traverse(c=>{if(c.material)c.material.dispose();});
        showBan('+'+orb.cfg.pts,orb.type==='gold'?'#ffcc22':'#44ee44');
      }else{
        // Tank hit flash
        orb.mesh.material.emissiveIntensity=2;
        setTimeout(()=>{if(orb.mesh.material)orb.mesh.material.emissiveIntensity=.6;},80);
        doSplat(p,orb.cfg.color,5);
      }
      updateHUD();return;
    }
  }
  // Miss
  const missDir=new THREE.Vector3(ptr.x,ptr.y,.5).unproject(cam);
  fireLaser(gunPos,cam.position.clone().add(missDir.sub(cam.position).normalize().multiplyScalar(40)),0xff4422);
}

// ========== HUD ==========
function updateHUD(){
  document.getElementById('hs').textContent=score.toLocaleString();
  document.getElementById('hi').textContent=`WAVE ${wave} · ${Math.floor(dist)}m`;
  document.getElementById('hk').textContent=`KILLS: ${kills}`;
  const hl=document.getElementById('hl');hl.innerHTML='';
  for(let i=0;i<5;i++){const p=document.createElement('div');p.className='lp'+(i>=lives?' x':'');hl.appendChild(p);}
}
function showBan(t,c){
  const b=document.getElementById('ban');b.textContent=t;b.style.color=c;
  b.style.textShadow=`0 0 20px ${c}`;b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
}
function showWave(){
  document.getElementById('wn').textContent=wave;
  const w=document.getElementById('wav');w.classList.remove('show');void w.offsetWidth;w.classList.add('show');
}
function showDmg(){const d=document.getElementById('dmg');d.classList.add('show');setTimeout(()=>d.classList.remove('show'),200);}

// ========== INPUT ==========
const scope=document.getElementById('scope');
document.addEventListener('mousemove',e=>{scope.style.left=e.clientX+'px';scope.style.top=e.clientY+'px';});
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];scope.style.left=t.clientX+'px';scope.style.top=t.clientY+'px';
},{passive:true});

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  scope.style.left=e.clientX+'px';scope.style.top=e.clientY+'px';
  shoot(e.clientX,e.clientY);
});

let keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(!gameActive&&e.code==='Space'){e.preventDefault();startGame();}
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// ========== GAME ==========
function startGame(){
  initA();
  score=0;kills=0;lives=5;wave=1;dist=0;speed=8;spawnAcc=0;
  gameActive=true;

  orbs.forEach(o=>{S.remove(o.mesh);});orbs=[];
  lasers.forEach(l=>{S.remove(l.beam);S.remove(l.imp);});lasers=[];
  splats.forEach(s=>{S.remove(s.mesh);});splats=[];

  cam.position.set(0,2.5,0);cam.rotation.set(0,0,0);
  document.getElementById('ss').classList.add('h');
  document.getElementById('es').classList.add('h');
  document.getElementById('hud').style.display='flex';
  updateHUD();showWave();
  spawnWave();
  lastFrame=performance.now();
}

function endGame(){
  if(!gameActive)return;gameActive=false;
  const isNew=score>hi;if(isNew){hi=score;localStorage.setItem('mhHS',hi);}
  document.getElementById('hud').style.display='none';
  document.getElementById('fs').textContent=score.toLocaleString();
  document.getElementById('fk').textContent=kills;
  document.getElementById('fd').textContent=Math.floor(dist)+'m';
  document.getElementById('hse').textContent=isNew?`NEW RECORD: ${score.toLocaleString()}`:`BEST: ${hi.toLocaleString()}`;
  document.getElementById('es').classList.remove('h');
}

// ========== LOOP ==========
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min((now-lastFrame)/1000,.05);
  lastFrame=now;

  if(!gameActive){R.render(S,cam);return;}

  // Auto-run forward
  speed=8+dist*.005;
  dist+=speed*dt;
  cam.position.z-=speed*dt;

  // A/D dodge
  if(keys['KeyA']||keys['ArrowLeft'])cam.position.x+=(Math.max(cam.position.x-6,-6)-cam.position.x)*dt*5;
  if(keys['KeyD']||keys['ArrowRight'])cam.position.x+=(Math.min(cam.position.x+6,6)-cam.position.x)*dt*5;
  // Drift back to center slowly
  if(!keys['KeyA']&&!keys['ArrowLeft']&&!keys['KeyD']&&!keys['ArrowRight']){
    cam.position.x*=1-dt*1.5;
  }

  // Head bob
  cam.position.y=2.5+Math.sin(now*.004)*.03;

  // Scroll ground
  g1.position.z+=speed*dt;g2.position.z+=speed*dt;
  if(g1.position.z>cam.position.z+10)g1.position.z-=400;
  if(g2.position.z>cam.position.z+10)g2.position.z-=400;

  // Scroll rocks
  rks.forEach(r=>{r.position.z+=speed*dt;if(r.position.z>cam.position.z+10)r.position.z-=192;});

  // Spawn waves
  const aliveCount=orbs.filter(o=>o.alive).length;
  if(aliveCount===0){
    wave++;speed+=1;
    showWave();showBan('WAVE '+wave,'#ff7722');
    setTimeout(()=>spawnWave(),800);
  }

  // Update orbs
  const t=now*.001;
  for(let i=orbs.length-1;i>=0;i--){
    const o=orbs[i];
    if(!o.alive){orbs.splice(i,1);continue;}

    // Move toward player
    const dir=cam.position.clone().sub(o.mesh.position).normalize();
    const spd=o.cfg.spd*(1+wave*.05);
    o.mesh.position.add(dir.multiplyScalar(spd*dt*3));

    // Wobble
    o.mesh.position.y+=Math.sin(t*3+o.wobble)*.01;
    o.mesh.rotation.y+=dt*2;

    // Scale pulse
    const sc=o.cfg.r*(1+Math.sin(t*4+o.wobble)*.06);
    o.mesh.scale.setScalar(sc);

    // Reached player?
    const d=o.mesh.position.distanceTo(cam.position);
    if(d<2){
      o.alive=false;lives--;
      sfxDmg();showDmg();doSplat(o.mesh.position.clone(),o.cfg.color,8);
      S.remove(o.mesh);o.mesh.traverse(c=>{if(c.material)c.material.dispose();});
      showBan('DAMAGE!','#ff2020');
      if(lives<=0)setTimeout(endGame,300);
      updateHUD();
    }

    // Too far behind? Remove
    if(o.mesh.position.z>cam.position.z+20){
      o.alive=false;S.remove(o.mesh);o.mesh.traverse(c=>{if(c.material)c.material.dispose();});
    }
  }

  // Update lasers
  for(let i=lasers.length-1;i>=0;i--){
    const l=lasers[i];l.life-=dt*6;
    l.beam.material.opacity=Math.max(0,l.life);
    l.imp.material.opacity=Math.max(0,l.life);
    l.imp.scale.setScalar(1+(1-l.life)*2);
    if(l.life<=0){
      S.remove(l.beam);S.remove(l.imp);
      l.beam.geometry.dispose();l.beam.material.dispose();
      l.imp.geometry.dispose();l.imp.material.dispose();
      lasers.splice(i,1);
    }
  }

  // Update splats
  for(let i=splats.length-1;i>=0;i--){
    const s=splats[i];
    s.mesh.position.x+=s.vx*dt;s.mesh.position.y+=s.vy*dt;s.mesh.position.z+=s.vz*dt;
    s.vy-=10*dt;s.life-=dt*2.5;
    s.mesh.material.opacity=Math.max(0,s.life);
    if(s.life<=0){S.remove(s.mesh);s.mesh.material.dispose();splats.splice(i,1);}
  }

  // Score from distance
  score=Math.max(score,Math.floor(dist*.3)+kills*10);
  updateHUD();
  R.render(S,cam);
}

// Init
if(hi>0)document.getElementById('hss').textContent=`BEST: ${hi.toLocaleString()}`;
document.getElementById('go').addEventListener('click',startGame);
document.getElementById('re').addEventListener('click',startGame);
document.getElementById('mn').addEventListener('click',()=>{
  document.getElementById('es').classList.add('h');
  document.getElementById('ss').classList.remove('h');
  if(hi>0)document.getElementById('hss').textContent=`BEST: ${hi.toLocaleString()}`;
});

window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});

lastFrame=performance.now();loop();
</script>
</body>
