<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>NEONSTRIKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#00fff2;--mag:#ff00ff;--yel:#ffe600;--red:#ff2040;--grn:#39ff14;--blu:#4488ff;--org:#ff8800;--bg:#08080f}
body{background:var(--bg);overflow:hidden;font-family:'Orbitron',monospace;color:#fff;height:100vh;width:100vw;
  user-select:none;-webkit-user-select:none;touch-action:none;cursor:crosshair}
canvas#gc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;touch-action:none}

/* HUD */
.hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;
  padding:max(8px,1.5vw) max(12px,2vw);background:linear-gradient(180deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.3) 70%,transparent);
  pointer-events:none}
.hud-l,.hud-c,.hud-r{display:flex;flex-direction:column;gap:2px}
.hud-l{align-items:flex-start}.hud-c{align-items:center}.hud-r{align-items:flex-end}
.h-score{font-size:clamp(20px,5vw,36px);font-weight:900;color:var(--cyan);
  text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan);letter-spacing:2px}
.h-level{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,12px);color:rgba(255,255,255,.5);letter-spacing:2px}
.xp-bar{width:clamp(80px,18vw,160px);height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:2px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));border-radius:2px;box-shadow:0 0 8px var(--cyan);transition:width .3s}
.h-combo{font-size:clamp(14px,3.5vw,24px);font-weight:700;color:var(--mag);text-shadow:0 0 15px var(--mag);
  transition:all .1s;min-height:20px}
.h-combo.hot{color:var(--yel);text-shadow:0 0 30px var(--yel),0 0 60px var(--yel);font-size:clamp(18px,4vw,28px)}
.h-combo.fire{color:var(--red);text-shadow:0 0 40px var(--red),0 0 80px var(--red);font-size:clamp(22px,5vw,34px);animation:fShake .1s infinite}
@keyframes fShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px) rotate(-1deg)}75%{transform:translateX(2px) rotate(1deg)}}
.h-mult{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,14px);color:var(--yel);text-shadow:0 0 8px var(--yel);opacity:.8}
.h-timer{font-family:'Share Tech Mono',monospace;font-size:clamp(18px,4.5vw,32px);color:var(--grn);text-shadow:0 0 15px var(--grn)}
.h-timer.danger{color:var(--red);text-shadow:0 0 20px var(--red);animation:tPulse .5s infinite}
@keyframes tPulse{0%,100%{opacity:1}50%{opacity:.3}}
.h-wave{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,13px);color:rgba(255,255,255,.5);letter-spacing:2px}
.h-mode{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.5vw,11px);color:var(--cyan);letter-spacing:3px;opacity:.6}
.h-lives{display:flex;gap:clamp(3px,0.8vw,6px);margin-top:3px}
.life-pip{width:clamp(8px,2vw,14px);height:clamp(8px,2vw,14px);border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);transition:.3s}
.life-pip.lost{background:rgba(255,32,64,.3);box-shadow:none}

/* Banners */
.banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:60;
  font-size:clamp(32px,8vw,80px);font-weight:900;letter-spacing:4px;pointer-events:none;opacity:0;white-space:nowrap}
.banner.show{animation:banBurst .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes banBurst{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}
  30%{transform:translate(-50%,-50%) scale(1.2) rotate(2deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.8) rotate(0);opacity:0}}
.wave-ban{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:70;text-align:center;pointer-events:none;opacity:0}
.wave-ban.show{animation:wFade 1.5s ease-out forwards}
.wave-ban .wn{font-size:clamp(50px,12vw,120px);font-weight:900;color:var(--cyan);text-shadow:0 0 40px var(--cyan),0 0 80px var(--cyan);line-height:1}
.wave-ban .wl{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,2vw,16px);color:rgba(255,255,255,.5);letter-spacing:8px;text-transform:uppercase}
@keyframes wFade{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}

/* Achievement */
.ach{position:fixed;top:max(70px,10vh);right:max(10px,2vw);z-index:90;background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(20,20,40,.9));
  border:1px solid var(--yel);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:0 0 30px rgba(255,230,0,.3);animation:achSlide 3s ease-in-out forwards;pointer-events:none;max-width:90vw}
.ach .ai{font-size:24px}.ach .at{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,1.8vw,12px);color:var(--yel);letter-spacing:1px}
.ach .an{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(11px,2vw,14px);color:#fff;display:block;margin-bottom:2px}
@keyframes achSlide{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}

/* Screens */
.scr{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(8,8,15,.95);backdrop-filter:blur(20px);cursor:default;padding:20px;overflow-y:auto}
.scr.hidden{display:none}
.title{font-size:clamp(36px,10vw,100px);font-weight:900;letter-spacing:clamp(4px,1vw,8px);
  background:linear-gradient(135deg,var(--cyan),var(--mag),var(--yel));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(0,255,242,.5));animation:tGlow 3s ease-in-out infinite}
@keyframes tGlow{0%,100%{filter:drop-shadow(0 0 30px rgba(0,255,242,.5))}33%{filter:drop-shadow(0 0 30px rgba(255,0,255,.5))}66%{filter:drop-shadow(0 0 30px rgba(255,230,0,.5))}}
.sub{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,18px);color:rgba(255,255,255,.4);margin-top:10px;letter-spacing:clamp(3px,1vw,6px);text-transform:uppercase}
.mode-sel{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:clamp(8px,2vw,16px);margin-top:clamp(20px,4vw,40px);width:min(700px,92vw)}
.mc{padding:clamp(12px,2.5vw,20px) clamp(10px,2vw,16px);background:rgba(255,255,255,.03);border:1px solid rgba(0,255,242,.15);
  border-radius:6px;cursor:pointer;text-align:center;transition:.2s}
.mc:hover,.mc:active{border-color:var(--cyan);background:rgba(0,255,242,.05);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,255,242,.2)}
.mc .mi{font-size:clamp(24px,5vw,36px);margin-bottom:8px}
.mc .mn{font-size:clamp(12px,2.5vw,16px);font-weight:700;letter-spacing:2px;margin-bottom:4px}
.mc .md{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.5vw,10px);color:rgba(255,255,255,.4);letter-spacing:1px;line-height:1.5}
.mc.blitz .mn{color:var(--cyan)}.mc.surv .mn{color:var(--red)}.mc.zen .mn{color:var(--grn)}.mc.prec .mn{color:var(--yel)}
.plvl{margin-top:16px;text-align:center}
.plvl .lt{font-size:clamp(10px,2vw,13px);color:var(--mag);letter-spacing:3px;text-shadow:0 0 10px var(--mag)}
.plvl .xbl{width:clamp(120px,30vw,200px);height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin:6px auto 0;overflow:hidden}
.plvl .xbl .f{height:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));border-radius:3px;box-shadow:0 0 8px var(--cyan)}
.hs-disp{margin-top:16px;font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,13px);color:var(--yel);
  text-shadow:0 0 10px var(--yel);letter-spacing:2px;text-align:center;line-height:1.8}
.et{font-size:clamp(28px,7vw,64px);font-weight:900;letter-spacing:4px}
.et.vic{background:linear-gradient(135deg,var(--yel),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,230,0,.5))}
.et.def{background:linear-gradient(135deg,var(--red),var(--mag));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,32,64,.5))}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2vw,14px);margin-top:clamp(16px,3vw,28px);width:min(480px,92vw)}
.sc{background:rgba(255,255,255,.03);border:1px solid rgba(0,255,242,.1);padding:clamp(8px,2vw,14px);text-align:center;border-radius:4px}
.sc .sl{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,1.3vw,9px);color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase}
.sc .sv{font-size:clamp(16px,4vw,24px);font-weight:900;margin-top:3px;color:var(--cyan);text-shadow:0 0 15px var(--cyan)}
.sc .sv.mag{color:var(--mag);text-shadow:0 0 15px var(--mag)}
.sc .sv.yel{color:var(--yel);text-shadow:0 0 15px var(--yel)}
.sc .sv.grn{color:var(--grn);text-shadow:0 0 15px var(--grn)}
.sc .sv.red{color:var(--red);text-shadow:0 0 15px var(--red)}
.xpg{margin-top:12px;font-size:clamp(12px,3vw,16px);font-weight:700;color:var(--cyan);text-shadow:0 0 15px var(--cyan);letter-spacing:2px;animation:xpP 1s ease-in-out infinite}
@keyframes xpP{0%,100%{opacity:1}50%{opacity:.6}}
.btn{padding:clamp(10px,2.5vw,16px) clamp(30px,8vw,50px);font-family:'Orbitron',monospace;font-size:clamp(13px,3vw,18px);
  font-weight:700;letter-spacing:3px;color:var(--bg);background:var(--cyan);border:none;cursor:pointer;
  clip-path:polygon(6% 0%,100% 0%,94% 100%,0% 100%);transition:.2s;text-transform:uppercase;margin-top:20px}
.btn:hover,.btn:active{background:var(--mag);transform:scale(1.05);box-shadow:0 0 40px var(--mag)}
.btn.sec{background:transparent;color:var(--cyan);border:1px solid var(--cyan);clip-path:none;
  font-size:clamp(9px,2vw,12px);padding:8px 24px;letter-spacing:3px;margin-top:10px}
.btn.sec:hover{background:rgba(0,255,242,.1);color:#fff}
.snd{position:fixed;top:10px;right:10px;z-index:110;font-size:clamp(16px,4vw,22px);background:none;border:none;cursor:pointer;opacity:.4;padding:8px}
.snd:hover,.snd:active{opacity:.8}

/* Touch crosshair */
.touch-cross{position:fixed;z-index:99;pointer-events:none;width:50px;height:50px;transform:translate(-50%,-50%);display:none}
.touch-cross::before,.touch-cross::after{content:'';position:absolute;background:var(--cyan);box-shadow:0 0 8px var(--cyan);border-radius:1px}
.touch-cross::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
.touch-cross::after{height:2px;width:100%;top:50%;transform:translateY(-50%)}
.touch-cross .td{position:absolute;width:6px;height:6px;background:var(--mag);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--mag)}
@media(pointer:coarse){body{cursor:default}.touch-cross{display:block}}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div class="touch-cross" id="tcross"><div class="td"></div></div>

<div class="hud" id="hud" style="display:none">
  <div class="hud-l">
    <div class="h-score" id="hScore">0</div>
    <div class="h-level" id="hLevel">LVL 1</div>
    <div class="xp-bar"><div class="xp-fill" id="hXp" style="width:0%"></div></div>
  </div>
  <div class="hud-c">
    <div class="h-combo" id="hCombo"></div>
    <div class="h-mult" id="hMult"></div>
  </div>
  <div class="hud-r">
    <div class="h-timer" id="hTimer">30.0</div>
    <div class="h-wave" id="hWave">WAVE 1</div>
    <div class="h-mode" id="hMode"></div>
    <div class="h-lives" id="hLives"></div>
  </div>
</div>

<div class="banner" id="banner"></div>
<div class="wave-ban" id="wBan"><div class="wl">WAVE</div><div class="wn" id="wNum">1</div></div>
<button class="snd" id="sndBtn">🔊</button>

<!-- Start -->
<div class="scr" id="startScr">
  <div class="title">NEONSTRIKE</div>
  <div class="sub">reflex // destroy // survive</div>
  <div class="mode-sel">
    <div class="mc blitz" data-mode="blitz"><div class="mi">⚡</div><div class="mn">BLITZ</div><div class="md">30 SEC FRENZY</div></div>
    <div class="mc surv" data-mode="survival"><div class="mi">💀</div><div class="mn">SURVIVAL</div><div class="md">5 LIVES ENDLESS</div></div>
    <div class="mc zen" data-mode="zen"><div class="mi">🧘</div><div class="mn">ZEN</div><div class="md">NO PRESSURE</div></div>
    <div class="mc prec" data-mode="precision"><div class="mi">🎯</div><div class="mn">PRECISION</div><div class="md">3 MISSES = END</div></div>
  </div>
  <div class="plvl"><div class="lt" id="mLvl">LEVEL 1</div><div class="xbl"><div class="f" id="mXp" style="width:0%"></div></div></div>
  <div class="hs-disp" id="hsStart"></div>
</div>

<!-- End -->
<div class="scr hidden" id="endScr">
  <div class="et def" id="eTitle">TERMINATED</div>
  <div class="sg">
    <div class="sc"><div class="sl">Score</div><div class="sv" id="fScore">0</div></div>
    <div class="sc"><div class="sl">Combo</div><div class="sv mag" id="fCombo">0</div></div>
    <div class="sc"><div class="sl">Hits</div><div class="sv yel" id="fHits">0</div></div>
    <div class="sc"><div class="sl">Accuracy</div><div class="sv grn" id="fAcc">0%</div></div>
    <div class="sc"><div class="sl">Wave</div><div class="sv" id="fWave">1</div></div>
    <div class="sc"><div class="sl">Bosses</div><div class="sv red" id="fBoss">0</div></div>
  </div>
  <div class="xpg" id="xpG"></div>
  <div class="hs-disp" id="hsEnd"></div>
  <button class="btn" id="rBtn">RESTART</button>
  <button class="btn sec" id="mBtn">MAIN MENU</button>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.162.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ========== THREE.JS SETUP ==========
const canvas = document.getElementById('gc');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x08080f);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x08080f, 0.012);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0, 30);

// Lights
const ambLight = new THREE.AmbientLight(0x222244, 0.5);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
dirLight.position.set(10, 20, 15);
scene.add(dirLight);

// Point lights for atmosphere
const pLight1 = new THREE.PointLight(0x00fff2, 2, 50);
pLight1.position.set(-15, 10, 10);
scene.add(pLight1);
const pLight2 = new THREE.PointLight(0xff00ff, 2, 50);
pLight2.position.set(15, -10, 10);
scene.add(pLight2);

// ========== GRID FLOOR ==========
const gridGeo = new THREE.PlaneGeometry(120, 120, 60, 60);
const gridMat = new THREE.MeshBasicMaterial({
  color: 0x00fff2, wireframe: true, transparent: true, opacity: 0.04
});
const grid = new THREE.Mesh(gridGeo, gridMat);
grid.rotation.x = -Math.PI / 2;
grid.position.y = -18;
scene.add(grid);

// Background particles
const bgCount = 300;
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(bgCount * 3);
const bgCol = new Float32Array(bgCount * 3);
const bgVel = [];
const neonCols = [
  new THREE.Color(0x00fff2), new THREE.Color(0xff00ff),
  new THREE.Color(0xffe600), new THREE.Color(0x4488ff)
];
for (let i = 0; i < bgCount; i++) {
  bgPos[i*3] = (Math.random() - 0.5) * 80;
  bgPos[i*3+1] = (Math.random() - 0.5) * 60;
  bgPos[i*3+2] = (Math.random() - 0.5) * 40 - 10;
  const c = neonCols[Math.floor(Math.random() * neonCols.length)];
  bgCol[i*3] = c.r; bgCol[i*3+1] = c.g; bgCol[i*3+2] = c.b;
  bgVel.push({ x: (Math.random()-0.5)*0.02, y: (Math.random()-0.5)*0.02, z: (Math.random()-0.5)*0.01 });
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
bgGeo.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
const bgMat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.6, sizeAttenuation: true });
const bgPts = new THREE.Points(bgGeo, bgMat);
scene.add(bgPts);

// ========== RAYCASTER ==========
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

// ========== BUBBLE MATERIALS ==========
function makeBubbleMat(color, emissive) {
  return new THREE.MeshPhysicalMaterial({
    color, emissive, emissiveIntensity: 0.6,
    metalness: 0.1, roughness: 0.15, clearcoat: 1.0, clearcoatRoughness: 0.05,
    transparent: true, opacity: 0.85,
    envMapIntensity: 1.5
  });
}

const MATS = {
  normal: makeBubbleMat(0x00fff2, 0x004444),
  fast: makeBubbleMat(0xff00ff, 0x440044),
  bonus: makeBubbleMat(0xffe600, 0x444400),
  danger: makeBubbleMat(0xff2040, 0x440010),
  phantom: makeBubbleMat(0x4488ff, 0x001144),
  splitter: makeBubbleMat(0xff8800, 0x442200),
  boss: makeBubbleMat(0xff00aa, 0x440033),
  powerup: makeBubbleMat(0x39ff14, 0x003300),
};

// Shared geometries
const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
const smallSphereGeo = new THREE.SphereGeometry(1, 24, 24);

// ========== SPLAT PARTICLES ==========
let splatParticles = [];
const splatGeo = new THREE.SphereGeometry(0.12, 8, 8);

function createSplat(pos, color, count = 30, force = 1) {
  const emissive = new THREE.Color(color).multiplyScalar(0.4);
  for (let i = 0; i < count; i++) {
    const mat = new THREE.MeshPhysicalMaterial({
      color, emissive, emissiveIntensity: 0.8,
      metalness: 0.2, roughness: 0.3, transparent: true, opacity: 1,
      clearcoat: 0.8
    });
    const m = new THREE.Mesh(splatGeo, mat);
    m.position.copy(pos);
    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 2 + 0.5
    ).normalize();
    const speed = (1.5 + Math.random() * 3) * force;
    const scale = 0.3 + Math.random() * 1.2;
    m.scale.setScalar(scale);
    scene.add(m);
    splatParticles.push({
      mesh: m, vel: dir.multiplyScalar(speed),
      life: 1, decay: 0.015 + Math.random() * 0.02,
      gravity: 0.06 + Math.random() * 0.04,
      stretch: 1 + Math.random() * 0.5
    });
  }
}

// ========== BUBBLE RING (pop effect) ==========
let rings = [];
function createRing(pos, color) {
  const ringGeo = new THREE.RingGeometry(0.5, 0.6, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(camera.position);
  scene.add(ring);
  rings.push({ mesh: ring, life: 1, speed: 0.15 });
}

// ========== GAME STATE ==========
let score=0,combo=0,maxCombo=0,hits=0,misses=0,clicks=0;
let timeLeft=30,wave=1,lives=5,bossesKilled=0,totalHW=0;
let gameActive=false,gameMode='blitz',gameSpeed=1;
let bubbles=[],spawnAccum=0,activePU={};
let soundEnabled=true,musicPlaying=false,musicNodes=[];
let screenShake={i:0,x:0,y:0};
let camBasePos = new THREE.Vector3(0, 0, 30);

let PD=JSON.parse(localStorage.getItem('nsData2')||'null')||{
  level:1,xp:0,highscores:{blitz:0,survival:0,zen:0,precision:0},totalHits:0,totalGames:0,achievements:[]
};
function saveD(){localStorage.setItem('nsData2',JSON.stringify(PD));}
function xpFor(l){return 100+(l-1)*60;}

// ========== AUDIO ==========
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function snd(type,freq,dur,vol=0.1){
  if(!audioCtx||!soundEnabled)return;
  const t=audioCtx.currentTime, o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=type;
  o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq*(type==='sawtooth'?0.3:2),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start();o.stop(t+dur);return o;
}
function playHit(f=800){snd('square',f,0.12,0.12);snd('sine',f*1.5,0.08,0.05);}
function playMiss(){snd('sawtooth',200,0.25,0.08);}
function playDanger(){snd('sawtooth',120,0.35,0.12);}
function playBossHit(){snd('square',150,0.2,0.15);}
function playCombo(){
  if(!audioCtx||!soundEnabled)return;
  [600,900,1200,1600].forEach((f,i)=>{setTimeout(()=>snd('sine',f,0.15,0.08),i*50);});
}
function playBossDie(){
  if(!audioCtx||!soundEnabled)return;
  for(let i=0;i<6;i++)setTimeout(()=>snd(i%2?'sawtooth':'square',200+i*150,0.15,0.1),i*60);
}
function playPowerup(){
  if(!audioCtx||!soundEnabled)return;
  [400,600,800,1000,1200].forEach((f,i)=>{setTimeout(()=>snd('sine',f,0.12,0.07),i*40);});
}

// Music
function startMusic(){
  if(!audioCtx||!soundEnabled||musicPlaying)return; musicPlaying=true;
  const bpm=140, bl=60/bpm;
  const bass=[55,55,73.4,65.4,55,55,82.4,73.4];
  let beat=0;
  function tick(){
    if(!musicPlaying)return;
    const t=audioCtx.currentTime+0.05, b=beat%8;
    if(b%2===0){const o=snd('sine',150,0.15,0.15);if(o)musicNodes.push(o);
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.connect(g2);g2.connect(audioCtx.destination);o2.type='sine';
      o2.frequency.setValueAtTime(150,t);o2.frequency.exponentialRampToValueAtTime(30,t+0.15);
      g2.gain.setValueAtTime(0.15,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o2.start(t);o2.stop(t+0.15);musicNodes.push(o2);
    }
    {const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const n=audioCtx.createBufferSource();n.buffer=buf;
    const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=8000;
    const g=audioCtx.createGain();g.gain.setValueAtTime(b%2===0?0.04:0.02,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    n.connect(hp);hp.connect(g);g.connect(audioCtx.destination);n.start(t);n.stop(t+0.05);}
    if(b%2===0){const o=snd('sawtooth',bass[b],0.2,0.06);if(o)musicNodes.push(o);}
    if(combo>=5&&b%2===1){
      const arp=[220,330,440,550,660];
      const note=arp[b%arp.length]*(1+Math.floor(combo/10)*0.25);
      snd('triangle',Math.min(note,2000),0.1,0.03+Math.min(combo*0.002,0.05));
    }
    beat++;
    if(musicPlaying)setTimeout(tick,bl*1000*gameSpeed);
  }
  tick();
}
function stopMusic(){musicPlaying=false;musicNodes.forEach(n=>{try{n.stop();}catch(e){}});musicNodes=[];}

// ========== SCREEN HELPERS ==========
function screenToWorld(sx, sy) {
  const ndc = new THREE.Vector2((sx / innerWidth) * 2 - 1, -(sy / innerHeight) * 2 + 1);
  const v = new THREE.Vector3(ndc.x, ndc.y, 0.5);
  v.unproject(camera);
  const dir = v.sub(camera.position).normalize();
  const dist = -camera.position.z / dir.z;
  return camera.position.clone().add(dir.multiplyScalar(dist * 0.55));
}

function worldToScreen(pos) {
  const v = pos.clone().project(camera);
  return { x: (v.x + 1) / 2 * innerWidth, y: (-v.y + 1) / 2 * innerHeight };
}

// ========== BUBBLE CONFIG ==========
const BT = {
  normal:  {pts:10, life:2500,freq:800, color:0x00fff2,r:1.2},
  fast:    {pts:25, life:1100,freq:1200,color:0xff00ff,r:0.8},
  bonus:   {pts:50, life:1600,freq:600, color:0xffe600,r:1.0},
  danger:  {pts:-30,life:3000,freq:0,   color:0xff2040,r:1.4},
  phantom: {pts:35, life:1900,freq:1000,color:0x4488ff,r:1.1},
  splitter:{pts:20, life:2200,freq:900, color:0xff8800,r:1.3},
};
const PUT={
  slowmo:{icon:'S',name:'SLOW-MO',dur:4000,color:'#ffe600'},
  nuke:{icon:'N',name:'NUKE',dur:0,color:'#ff2040'},
  timeplus:{icon:'T',name:'TIME+5',dur:0,color:'#39ff14'},
  multi:{icon:'M',name:'MULTI',dur:5000,color:'#ff00ff'},
  shield:{icon:'H',name:'SHIELD',dur:6000,color:'#4488ff'},
};

function pickType(){
  const r=Math.random();
  const dc=Math.min(.10+wave*.015,.22),fc=Math.min(.12+wave*.025,.35);
  const pc=wave>=2?Math.min(.08+wave*.01,.15):0, sc=wave>=3?Math.min(.06+wave*.01,.12):0;
  let c=0;
  c+=dc;if(r<c)return'danger'; c+=.07;if(r<c)return'bonus';
  c+=pc;if(r<c)return'phantom'; c+=sc;if(r<c)return'splitter';
  c+=fc;if(r<c)return'fast'; return'normal';
}

// ========== SPAWN BUBBLE ==========
function spawnBubble(type, pos, lifeOvr, isChild) {
  if (!gameActive) return;
  if (!type) type = pickType();
  const cfg = BT[type];
  const life = lifeOvr || cfg.life * Math.max(0.4, 1 - wave * 0.04);

  const mat = MATS[type].clone();
  const geo = isChild ? smallSphereGeo : sphereGeo;
  const mesh = new THREE.Mesh(geo, mat);
  const r = isChild ? cfg.r * 0.55 : cfg.r;

  if (!pos) {
    const bounds = getBounds();
    pos = new THREE.Vector3(
      (Math.random() - 0.5) * bounds.x * 1.6,
      (Math.random() - 0.5) * bounds.y * 1.4,
      (Math.random() - 0.5) * 6
    );
  }
  mesh.position.copy(pos);
  mesh.scale.setScalar(0.01);

  // Inner glow sphere
  const glowMat = new THREE.MeshBasicMaterial({ color: cfg.color, transparent: true, opacity: 0.15 });
  const glowMesh = new THREE.Mesh(sphereGeo, glowMat);
  glowMesh.scale.setScalar(1.3);
  mesh.add(glowMesh);

  // Point light on bubble
  const bLight = new THREE.PointLight(cfg.color, 0.8, 8);
  mesh.add(bLight);

  scene.add(mesh);

  // Movement
  let mv = null;
  if (!isChild && wave >= 2 && Math.random() < Math.min(0.15 + wave * 0.06, 0.5)) {
    const pats = ['float', 'orbit', 'drift'];
    mv = {
      pattern: pats[Math.floor(Math.random() * pats.length)],
      speed: (0.3 + Math.random()) * (1 + wave * 0.08),
      phase: Math.random() * Math.PI * 2,
      origin: pos.clone(),
      amp: 1 + Math.random() * 2
    };
  }

  const bubble = {
    mesh, type, cfg, r, alive: true, life, spawn: performance.now(),
    mv, isChild, scaleT: 0, wobble: Math.random() * 10,
    pulseSpeed: 1 + Math.random() * 2
  };

  bubble.timer = setTimeout(() => {
    if (!bubble.alive) return;
    expireBubble(bubble);
  }, life / gameSpeed);

  bubbles.push(bubble);
  return bubble;
}

function spawnPU(pos, guaranteed) {
  if (!guaranteed && Math.random() > 0.35) return;
  let types = Object.keys(PUT);
  if (gameMode !== 'blitz') types = types.filter(t => t !== 'timeplus');
  if (gameMode === 'zen') types = types.filter(t => t !== 'shield');
  const puType = types[Math.floor(Math.random() * types.length)];

  const mat = MATS.powerup.clone();
  const mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.position.copy(pos);
  mesh.scale.setScalar(0.01);

  const glow = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ color: 0x39ff14, transparent: true, opacity: 0.2 }));
  glow.scale.setScalar(1.3);
  mesh.add(glow);
  mesh.add(new THREE.PointLight(0x39ff14, 1, 8));

  scene.add(mesh);

  const bubble = {
    mesh, type: 'powerup', puType, cfg: { pts: 0, color: 0x39ff14, r: 0.9 },

  };

  bubble.timer = setTimeout(() => {
    if (!bubble.alive) return;
    bubble.alive = false;
    shrinkRemove(bubble);
  }, 3500);

  bubbles.push(bubble);
}

// ========== POP BUBBLE ==========
function popBubble(bubble, hit = true) {
  const pos = bubble.mesh.position.clone();
  const color = bubble.cfg.color;
  const hexColor = '#' + new THREE.Color(color).getHexString();

  // Splat particles
  const count = hit ? 25 + Math.floor(combo / 3) * 5 : 15;
  const force = hit ? 1.2 + combo * 0.05 : 0.8;
  createSplat(pos, color, count, force);

  // Pop ring
  createRing(pos, color);

  // Remove mesh
  scene.remove(bubble.mesh);
  bubble.mesh.traverse(child => {
    if (child.material) child.material.dispose();
    if (child.geometry) child.geometry.dispose();
  });
}

function shrinkRemove(bubble) {
  const mesh = bubble.mesh;
  const start = performance.now();
  function shrink() {
    const t = (performance.now() - start) / 300;
    if (t >= 1) { scene.remove(mesh); return; }
    mesh.scale.setScalar(bubble.r * (1 - t));
    mesh.material.opacity = 0.85 * (1 - t);
    requestAnimationFrame(shrink);
  }
  shrink();
}

// ========== HIT / MISS ==========
function hitBubble(bubble) {
  if (!bubble.alive) return;
  bubble.alive = false;
  clearTimeout(bubble.timer);
  const { type, cfg } = bubble;
  clicks++;

  if (type === 'danger') {
    if (activePU.shield) {
      popBubble(bubble); playHit(400);
      showFloatText(bubble.mesh.position, 'BLOCKED', '#4488ff');
    } else {
      combo = 0;
      if (gameMode === 'survival') loseLife();
      else if (gameMode === 'precision') { misses++; if (misses >= 3) { endGame(); return; } }
      else { score = Math.max(0, score + cfg.pts); }
      playDanger(); popBubble(bubble);
      showFloatText(bubble.mesh.position, cfg.pts, '#ff2040');
      shakeScreen(8);
    }
  } else if (type === 'powerup') {
    popBubble(bubble); activatePU(bubble.puType); playPowerup();
  } else if (type === 'boss') {
    bubble.hp--;
    clicks++; hits++;
    playBossHit(); shakeScreen(4);
    createSplat(bubble.mesh.position.clone(), 0xff00aa, 10, 0.8);
    combo++; if (combo > maxCombo) maxCombo = combo;
    const m = getMult(), pts = Math.round(15 * m); score += pts;
    showFloatText(bubble.mesh.position, pts, '#ff00aa');
    if (bubble.hp <= 0) {
      bubble.alive = false; bossesKilled++;
      const bp = Math.round(cfg.pts * m); score += bp;
      playBossDie(); shakeScreen(15);
      popBubble(bubble);
      showFloatText(bubble.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), bp, '#ffe600');
      showBanner('BOSS DESTROYED', '#ff00aa');
      checkAch('bossSlayer', 'BOSS SLAYER', 'Destroyed a boss');
      spawnPU(bubble.mesh.position.clone(), true);
    } else {
      // Flash boss
      bubble.mesh.material.emissiveIntensity = 2;
      setTimeout(() => { if (bubble.mesh.material) bubble.mesh.material.emissiveIntensity = 0.6; }, 100);
      // Scale boss ring to show HP
      if (bubble.bossRing) {
        const pct = bubble.hp / bubble.maxHp;
        bubble.bossRing.scale.setScalar(pct);
      }
    }
    updateHUD();
    return;
  } else {
    hits++; totalHW++; combo++; if (combo > maxCombo) maxCombo = combo;
    const m = getMult(), pts = Math.round(cfg.pts * m); score += pts;
    playHit(cfg.freq); popBubble(bubble);
    const hexC = '#' + new THREE.Color(cfg.color).getHexString();
    showFloatText(bubble.mesh.position, pts, hexC);
    if (combo >= 5) shakeScreen(2 + Math.min(combo * 0.3, 6));
    checkComboMs();

    if (activePU.multi) {
      bubbles.forEach(b => {
        if (b.alive && b !== bubble && b.type !== 'danger' && b.type !== 'boss' && b.type !== 'powerup') {
          const d = b.mesh.position.distanceTo(bubble.mesh.position);
          if (d < 6) setTimeout(() => { if (b.alive) hitBubble(b); }, 50);
        }
      });
    }

    if (type === 'splitter' && !bubble.isChild) {
      const p = bubble.mesh.position;
      spawnBubble('normal', p.clone().add(new THREE.Vector3(-1.5, 0.5, 0)), 1500, true);
      spawnBubble('normal', p.clone().add(new THREE.Vector3(1.5, 0.5, 0)), 1500, true);
    }

    if (Math.random() < 0.04 + wave * 0.005) spawnPU(bubble.mesh.position.clone(), false);
  }
  updateHUD();
}

function expireBubble(bubble) {
  if (!bubble.alive) return;
  bubble.alive = false;
  if (bubble.type !== 'danger' && bubble.type !== 'powerup') {
    combo = 0; misses++;
    if (gameMode === 'precision' && misses >= 3) { endGame(); return; }
    playMiss();
  }
  shrinkRemove(bubble);
  updateHUD();
}

function loseLife() { lives--; shakeScreen(10); if (lives <= 0) endGame(); }

// ========== POWERUPS ==========
function activatePU(type) {
  const pu = PUT[type]; showBanner(pu.name, pu.color);
  if (type === 'nuke') {
    bubbles.forEach(b => {
      if (b.alive && b.type !== 'danger' && b.type !== 'boss' && b.type !== 'powerup') {
        b.alive = false; clearTimeout(b.timer); hits++; combo++;
        score += Math.round(b.cfg.pts * getMult());
        popBubble(b);
      }
    });
    if (combo > maxCombo) maxCombo = combo;
    shakeScreen(15); updateHUD(); return;
  }
  if (type === 'timeplus') { timeLeft = Math.min(timeLeft + 5, 60); updateHUD(); return; }
  activePU[type] = true;
  if (type === 'slowmo') gameSpeed = 0.4;
  setTimeout(() => {
    delete activePU[type];
    if (type === 'slowmo') gameSpeed = 1;
  }, pu.dur);
}

  } else el.textContent = value;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ========== HUD ==========
function updateHUD() {
  document.getElementById('hScore').textContent = score.toLocaleString();
  const m = getMult();
  document.getElementById('hMult').textContent = m > 1 ? `×${m.toFixed(1)}` : '';
  const hc = document.getElementById('hCombo');
  if (combo >= 15) { hc.className = 'h-combo fire'; hc.textContent = `${combo}x COMBO`; }
  else if (combo >= 5) { hc.className = 'h-combo hot'; hc.textContent = `${combo}x COMBO`; }
  else if (combo >= 2) { hc.className = 'h-combo'; hc.textContent = `${combo}x`; }
  else { hc.className = 'h-combo'; hc.textContent = ''; }

  const ht = document.getElementById('hTimer');
  if (gameMode === 'blitz') {
    ht.textContent = timeLeft.toFixed(1);
    ht.className = timeLeft <= 5 ? 'h-timer danger' : 'h-timer';
    ht.style.display = '';
  } else ht.style.display = 'none';

  document.getElementById('hWave').textContent = `WAVE ${wave}`;

  const hl = document.getElementById('hLives');
  if (gameMode === 'survival') {
    hl.innerHTML = ''; hl.style.display = 'flex';
    for (let i = 0; i < 5; i++) { const p = document.createElement('div'); p.className = 'life-pip' + (i >= lives ? ' lost' : ''); hl.appendChild(p); }
  } else if (gameMode === 'precision') {
    hl.innerHTML = ''; hl.style.display = 'flex';
    const ml = 3 - misses;
    for (let i = 0; i < 3; i++) {
      const p = document.createElement('div'); p.className = 'life-pip' + (i >= ml ? ' lost' : '');
      if (i < ml) { p.style.background = 'var(--yel)'; p.style.boxShadow = '0 0 8px var(--yel)'; }
      hl.appendChild(p);
    }
  } else hl.style.display = 'none';

  document.getElementById('hXp').style.width = (PD.xp / xpFor(PD.level) * 100) + '%';
  document.getElementById('hLevel').textContent = `LVL ${PD.level}`;
}

function getBounds() {
  const vFov = camera.fov * Math.PI / 180;
  const h = 2 * Math.tan(vFov / 2) * camera.position.z * 0.5;
  const w = h * camera.aspect;
  return { x: w, y: h };
}

function getSpawnRate() { return Math.max(280, (gameMode === 'zen' ? 1200 : 950) - wave * 70); }

let touchMode = false;
const tcross = document.getElementById('tcross');

function handlePointer(x, y) {
  if (!gameActive) return;
  pointer.x = (x / innerWidth) * 2 - 1;
  pointer.y = -(y / innerHeight) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  const meshes = bubbles.filter(b => b.alive).map(b => b.mesh);
  const intersects = raycaster.intersectObjects(meshes, true);

  if (intersects.length > 0) {
    let hitMesh = intersects[0].object;
    while (hitMesh.parent && hitMesh.parent !== scene) hitMesh = hitMesh.parent;
    const bubble = bubbles.find(b => b.mesh === hitMesh && b.alive);
    if (bubble) { hitBubble(bubble); return; }
  }

  // Miss
  clicks++;
  if (combo > 0) combo = 0;
  if (gameMode === 'precision') { misses++; if (misses >= 3) { endGame(); return; } }
  updateHUD(); playMiss();
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (e.pointerType === 'touch') {
    touchMode = true;
    tcross.style.left = e.clientX + 'px';
    tcross.style.top = e.clientY + 'px';
  }
  handlePointer(e.clientX, e.clientY);
});

canvas.addEventListener('pointermove', e => {
  if (touchMode && e.pointerType === 'touch') {
    tcross.style.left = e.clientX + 'px';
    tcross.style.top = e.clientY + 'px';
  }
});

document.addEventListener('mousemove', e => {
  if (!touchMode) {
    tcross.style.display = 'none';
  }
});

// ========== GAME LOOP ==========
let lastFrame = 0;

function startGame(mode) {
  initAudio(); gameMode = mode;
  score=0;combo=0;maxCombo=0;hits=0;misses=0;clicks=0;
  timeLeft=30;wave=1;lives=5;bossesKilled=0;totalHW=0;
  gameActive=true;gameSpeed=1;activePU={};spawnAccum=0;

  // Clean bubbles
  bubbles.forEach(b => { clearTimeout(b.timer); scene.remove(b.mesh); });
  bubbles = [];
  splatParticles.forEach(s => scene.remove(s.mesh));
  splatParticles = [];
  rings.forEach(r => scene.remove(r.mesh));
  rings = [];

  document.getElementById('startScr').classList.add('hidden');
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hMode').textContent = mode.toUpperCase();
  updateHUD(); showWave(); startMusic();

  lastFrame = performance.now();
}

function gameLoop() {
  requestAnimationFrame(gameLoop);
  const now = performance.now();
  const rawDt = Math.min((now - lastFrame) / 1000, 0.1);
  lastFrame = now;

  if (!gameActive) {
    // Animate bg even when not playing
    animateBg(now);
    renderer.render(scene, camera);
    return;
  }

  const dt = rawDt * gameSpeed;

  // Timer
  if (gameMode === 'blitz') {
    timeLeft -= dt;
    if (timeLeft <= 0) { timeLeft = 0; endGame(); }
    const nw = Math.floor((30 - timeLeft) / 8) + 1;
    if (nw > wave && nw <= 4) { wave = nw; showWave(); }
  } else {
    const hpw = 15 + wave * 5;
    if (totalHW >= hpw) {
      wave++; totalHW = 0; showWave();
      if (gameMode === 'survival' && wave % 3 === 0) setTimeout(() => spawnBoss(), 500);
    }
  }

  // Spawn
  spawnAccum += dt * 1000;
  const rate = getSpawnRate();
  while (spawnAccum >= rate) { spawnAccum -= rate; spawnBubble(); }

  // Update bubbles
  bubbles.forEach(bubble => {
    if (!bubble.alive && bubble.type !== 'boss') return;
    if (!bubble.alive) return;

    // Scale in
    if (bubble.scaleT < 1) {
      bubble.scaleT = Math.min(1, bubble.scaleT + rawDt * 5);
      const ease = 1 - Math.pow(1 - bubble.scaleT, 3);
      bubble.mesh.scale.setScalar(bubble.r * ease);
    }

    // Wobble (4D-like deformation)
    const t = now * 0.001;
    const w = bubble.wobble;
    const ps = bubble.pulseSpeed;
    const sx = bubble.r * (1 + Math.sin(t * ps + w) * 0.08);
    const sy = bubble.r * (1 + Math.sin(t * ps * 1.3 + w + 1) * 0.08);
    const sz = bubble.r * (1 + Math.sin(t * ps * 0.7 + w + 2) * 0.08);
    if (bubble.scaleT >= 1) bubble.mesh.scale.set(sx, sy, sz);

    // Rotation (4D projection feel)
    bubble.mesh.rotation.x += rawDt * 0.3 * Math.sin(t + w);
    bubble.mesh.rotation.y += rawDt * 0.5;
    bubble.mesh.rotation.z += rawDt * 0.2 * Math.cos(t * 0.7 + w);

    // Phantom flicker
    if (bubble.type === 'phantom') {
      const flicker = Math.sin(t * 5 + w) > 0.3 ? 0.85 : 0.08;
      bubble.mesh.material.opacity = flicker;
    }

    // Movement
    if (bubble.mv) {
      const elapsed = (now - bubble.spawn) / 1000;
      const m = bubble.mv;
      if (m.pattern === 'float') {
        bubble.mesh.position.y = m.origin.y + Math.sin(elapsed * m.speed + m.phase) * m.amp;
        bubble.mesh.position.x = m.origin.x + Math.cos(elapsed * m.speed * 0.7 + m.phase) * m.amp * 0.5;
      } else if (m.pattern === 'orbit') {
        bubble.mesh.position.x = m.origin.x + Math.cos(elapsed * m.speed + m.phase) * m.amp;
        bubble.mesh.position.y = m.origin.y + Math.sin(elapsed * m.speed + m.phase) * m.amp;
      } else if (m.pattern === 'drift') {
        bubble.mesh.position.x = m.origin.x + elapsed * m.speed * Math.cos(m.phase);
        bubble.mesh.position.y = m.origin.y + elapsed * m.speed * Math.sin(m.phase) * 0.5;
      }
    }
  });

  // Update splat particles
  for (let i = splatParticles.length - 1; i >= 0; i--) {
    const p = splatParticles[i];
    p.mesh.position.add(p.vel.clone().multiplyScalar(rawDt * 60 * gameSpeed));
    p.vel.y -= p.gravity * rawDt * 60;
    p.vel.multiplyScalar(0.97);
    p.life -= p.decay * gameSpeed;

    // Stretch in movement direction
    const speed = p.vel.length();
    if (speed > 0.1) {
      p.mesh.scale.z = p.mesh.scale.x * (1 + speed * p.stretch * 0.3);
      p.mesh.lookAt(p.mesh.position.clone().add(p.vel));
    }

    p.mesh.material.opacity = p.life;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.material.dispose();
      splatParticles.splice(i, 1);
    }
  }

  // Update rings
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.life -= r.speed * rawDt * 60 * gameSpeed;
    const s = 1 + (1 - r.life) * 5;
    r.mesh.scale.setScalar(s);
    r.mesh.material.opacity = r.life * 0.6;
    if (r.life <= 0) {
      scene.remove(r.mesh);
      r.mesh.material.dispose();
      r.mesh.geometry.dispose();
      rings.splice(i, 1);
    }
  }

  // Camera shake
  if (screenShake.i > 0) {
    camera.position.x = camBasePos.x + (Math.random() - 0.5) * screenShake.i * 0.06;
    camera.position.y = camBasePos.y + (Math.random() - 0.5) * screenShake.i * 0.06;
    screenShake.i *= 0.88;
    if (screenShake.i < 0.3) {
      screenShake.i = 0;
      camera.position.copy(camBasePos);
    }
  }

  animateBg(now);
  updateHUD();
  renderer.render(scene, camera);
}

function animateBg(now) {
  // Animate lights
  const t = now * 0.001;
  pLight1.position.x = Math.sin(t * 0.5) * 15;
  pLight1.position.y = Math.cos(t * 0.3) * 10;
  pLight2.position.x = Math.cos(t * 0.4) * 15;
  pLight2.position.y = Math.sin(t * 0.6) * 10;

  // Animate bg particles
  const posArr = bgGeo.attributes.position.array;
  for (let i = 0; i < bgCount; i++) {
    posArr[i*3] += bgVel[i].x;
    posArr[i*3+1] += bgVel[i].y;
    posArr[i*3+2] += bgVel[i].z;
    if (posArr[i*3] > 40) posArr[i*3] = -40;
    if (posArr[i*3] < -40) posArr[i*3] = 40;
    if (posArr[i*3+1] > 30) posArr[i*3+1] = -30;
    if (posArr[i*3+1] < -30) posArr[i*3+1] = 30;
  }
  bgGeo.attributes.position.needsUpdate = true;

  // Rotate grid
  grid.position.z = Math.sin(t * 0.2) * 2 - 5;
}

function endGame() {
  gameActive = false; stopMusic();
  document.getElementById('hud').style.display = 'none';

  // Clean up remaining bubbles with pop
  bubbles.forEach(b => {
    if (b.alive) { b.alive = false; clearTimeout(b.timer); shrinkRemove(b); }
  });

  const xpG = Math.round(score * 0.1 + hits * 2 + maxCombo * 3 + bossesKilled * 20);
  PD.xp += xpG; PD.totalHits += hits; PD.totalGames++;
  while (PD.xp >= xpFor(PD.level)) { PD.xp -= xpFor(PD.level); PD.level++; }
  const isNew = score > (PD.highscores[gameMode] || 0);
  if (isNew) PD.highscores[gameMode] = score;
  saveD();

  const et = document.getElementById('eTitle');
  if (gameMode === 'survival' && wave >= 10) { et.textContent = 'LEGENDARY'; et.className = 'et vic'; }
  else { et.textContent = 'TERMINATED'; et.className = 'et def'; }

  document.getElementById('fScore').textContent = score.toLocaleString();
  document.getElementById('fCombo').textContent = maxCombo + 'x';
  document.getElementById('fHits').textContent = hits;
  const acc = clicks > 0 ? Math.round((hits / clicks) * 100) : 0;
  document.getElementById('fAcc').textContent = acc + '%';
  document.getElementById('fWave').textContent = wave;
  document.getElementById('fBoss').textContent = bossesKilled;
  document.getElementById('xpG').textContent = `+${xpG} XP`;
  document.getElementById('hsEnd').textContent = isNew ? `NEW HIGHSCORE: ${score.toLocaleString()}` : `BEST: ${(PD.highscores[gameMode] || 0).toLocaleString()}`;
  document.getElementById('endScr').classList.remove('hidden');

  if (score >= 1000) checkAch('s1k', 'FOUR DIGITS', '1,000+ pts');
  if (score >= 5000) checkAch('s5k', 'NEON WARRIOR', '5,000+ pts');
  if (acc >= 90 && clicks >= 20) checkAch('sharp', 'SHARPSHOOTER', '90%+ accuracy');
  if (wave >= 10) checkAch('w10', 'WAVE SURFER', 'Wave 10');
}

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ========== MENU ==========
function updateMenu() {
  const hs = PD.highscores; let t = '';
  if (hs.blitz > 0) t += `BLITZ: ${hs.blitz.toLocaleString()}  `;
  if (hs.survival > 0) t += `SURVIVAL: ${hs.survival.toLocaleString()}  `;
  if (hs.zen > 0) t += `ZEN: ${hs.zen.toLocaleString()}  `;
  if (hs.precision > 0) t += `PRECISION: ${hs.precision.toLocaleString()}`;
  document.getElementById('hsStart').textContent = t;
  document.getElementById('mLvl').textContent = `LEVEL ${PD.level}`;
  document.getElementById('mXp').style.width = (PD.xp / xpFor(PD.level) * 100) + '%';
}
updateMenu();

document.querySelectorAll('.mc').forEach(c => c.addEventListener('click', () => startGame(c.dataset.mode)));
document.getElementById('rBtn').addEventListener('click', () => startGame(gameMode));
document.getElementById('mBtn').addEventListener('click', () => {
  document.getElementById('endScr').classList.add('hidden');
  document.getElementById('startScr').classList.remove('hidden');
  updateMenu();
});
document.getElementById('sndBtn').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('sndBtn').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) stopMusic(); else if (gameActive) startMusic();
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !gameActive) {
    e.preventDefault();
    if (!document.getElementById('startScr').classList.contains('hidden')) startGame('blitz');
    else startGame(gameMode);
  }
  if (e.code === 'Escape' && gameActive) endGame();
  if (e.code === 'KeyM') {
    soundEnabled = !soundEnabled;
    document.getElementById('sndBtn').textContent = soundEnabled ? '🔊' : '🔇';
    if (!soundEnabled) stopMusic(); else if (gameActive) startMusic();
  }
});

// Start render loop
lastFrame = performance.now();
gameLoop();
</script>
